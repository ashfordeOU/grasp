name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-npm:
    name: Publish grasp-mcp-server to npm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: mcp/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run build
      - name: Publish to npm (skip if already published)
        continue-on-error: true
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "grasp-mcp-server@$VERSION" version 2>/dev/null | grep -q "$VERSION"; then
            echo "Version $VERSION already published, skipping."
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-mcp-registry:
    name: Publish to MCP Registry
    runs-on: ubuntu-latest
    needs: [publish-npm]
    permissions:
      id-token: write
    defaults:
      run:
        working-directory: mcp
    steps:
      - uses: actions/checkout@v5
      - name: Install mcp-publisher (pre-built binary)
        run: |
          curl -fsSL https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz \
            | tar -xz -C /usr/local/bin mcp-publisher
          chmod +x /usr/local/bin/mcp-publisher
      - name: Login via GitHub OIDC
        run: mcp-publisher login github-oidc
      - name: Publish to MCP registry (skip if already published)
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if mcp-publisher validate server.json 2>&1 | grep -q "already published"; then
            echo "Version $VERSION already in registry, skipping."
          else
            mcp-publisher publish server.json || echo "Publish returned non-zero (may already exist), continuing."
          fi

  build-vscode:
    name: Build & Publish VS Code extension
    runs-on: ubuntu-latest
    needs: [publish-npm]
    defaults:
      run:
        working-directory: vscode-extension
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Package extension (.vsix)
        run: npx vsce package --no-dependencies
      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: grasp-vscode-vsix
          path: vscode-extension/*.vsix
      - name: Publish to VS Code Marketplace
        run: |
          if [ -n "$VSCE_PAT" ]; then
            npx vsce publish --no-dependencies --pat "$VSCE_PAT"
          else
            echo "VSCE_PAT not set — skipping VS Code Marketplace publish"
          fi
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

  publish-jetbrains:
    name: Publish JetBrains plugin to Marketplace
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: jetbrains-plugin
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-disabled: true
      - name: Build and sign plugin
        run: ./gradlew signPlugin --no-build-cache
        env:
          PLUGIN_CERTIFICATE_CHAIN: ${{ secrets.PLUGIN_CERTIFICATE_CHAIN }}
          PLUGIN_PRIVATE_KEY: ${{ secrets.PLUGIN_PRIVATE_KEY }}
          PLUGIN_PRIVATE_KEY_PASSWORD: ${{ secrets.PLUGIN_PRIVATE_KEY_PASSWORD }}
      - name: Upload signed plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: grasp-jetbrains-signed
          path: jetbrains-plugin/build/distributions/*.zip
      - name: Publish to JetBrains Marketplace
        run: |
          set +e
          ./gradlew publishPlugin --no-build-cache 2>&1 | tee /tmp/jb_publish.log
          RC=${PIPESTATUS[0]}
          set -e
          if [ $RC -ne 0 ]; then
            if grep -q "already contains version" /tmp/jb_publish.log; then
              echo "Version already published, skipping."
            else
              exit $RC
            fi
          fi
        env:
          PLUGIN_CERTIFICATE_CHAIN: ${{ secrets.PLUGIN_CERTIFICATE_CHAIN }}
          PLUGIN_PRIVATE_KEY: ${{ secrets.PLUGIN_PRIVATE_KEY }}
          PLUGIN_PRIVATE_KEY_PASSWORD: ${{ secrets.PLUGIN_PRIVATE_KEY_PASSWORD }}
          PUBLISH_TOKEN: ${{ secrets.JETBRAINS_PUBLISH_TOKEN }}

  publish-docker:
    name: Publish Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push (amd64, all registries in one pass)
        uses: docker/build-push-action@v5
        with:
          context: docker/
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/ashfordeou/grasp:latest
            ghcr.io/ashfordeou/grasp:${{ github.ref_name }}
            ${{ env.DOCKERHUB_USERNAME != '' && 'ashforde/grasp:latest' || '' }}
            ${{ env.DOCKERHUB_USERNAME != '' && format('ashforde/grasp:{0}', github.ref_name) || '' }}
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

  build-chrome:
    name: Build Chrome extension
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: browser-extension
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: browser-extension/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Copy static assets and LICENSE into dist
        run: |
          sed 's|dist/content\.js|content.js|g; s|dist/background\.js|background.js|g' manifest.json > dist/manifest.json
          cp popup.html dist/popup.html 2>/dev/null || true
          cp -r icons dist/icons
          cp ../LICENSE dist/LICENSE
      - name: Package extension (.zip)
        run: |
          cd dist && zip -r ../grasp-chrome-extension.zip .
      - name: Upload Chrome extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: grasp-chrome-extension
          path: browser-extension/grasp-chrome-extension.zip
      - name: Publish to Chrome Web Store
        if: ${{ env.CHROME_CLIENT_ID != '' }}
        env:
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
        run: |
          # Exchange refresh token for access token
          TOKEN_RESPONSE=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d client_id="$CHROME_CLIENT_ID" \
            -d client_secret="$CHROME_CLIENT_SECRET" \
            -d refresh_token="$CHROME_REFRESH_TOKEN" \
            -d grant_type=refresh_token)
          ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")

          # Upload the zip
          UPLOAD_RESPONSE=$(curl -s -X PUT \
            "https://www.googleapis.com/upload/chromewebstore/v1.1/items/$CHROME_EXTENSION_ID" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "x-goog-api-version: 2" \
            -T "grasp-chrome-extension.zip")
          echo "Upload response: $UPLOAD_RESPONSE"

          UPLOAD_STATE=$(echo "$UPLOAD_RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('uploadState',''))" 2>/dev/null || echo "")
          ERROR_CODE=$(echo "$UPLOAD_RESPONSE" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          errs=d.get('itemError',[])
          print(errs[0].get('error_code','') if errs else '')
          " 2>/dev/null || echo "")

          if [ "$ERROR_CODE" = "ITEM_NOT_UPDATABLE" ]; then
            echo "Extension is in pending review / not updatable — skipping publish. Will auto-publish on next release once review is approved."
            exit 0
          fi

          if [ "$UPLOAD_STATE" != "SUCCESS" ]; then
            echo "Upload failed with state: $UPLOAD_STATE"
            exit 1
          fi

          # Publish the item
          PUBLISH_RESPONSE=$(curl -s -X POST \
            "https://www.googleapis.com/chromewebstore/v1.1/items/$CHROME_EXTENSION_ID/publish" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "x-goog-api-version: 2" \
            -H "Content-Length: 0")
          echo "Publish response: $PUBLISH_RESPONSE"

          STATUS=$(echo "$PUBLISH_RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',[''])[0])" 2>/dev/null || echo "")
          PUBLISH_ERROR=$(echo "$PUBLISH_RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('error',{}).get('message',''))" 2>/dev/null || echo "")
          if [ "$STATUS" = "OK" ] || [ "$STATUS" = "publishedWithFriction" ]; then
            echo "Successfully published to Chrome Web Store."
          elif echo "$PUBLISH_ERROR" | grep -qi "privacy"; then
            echo "WARNING: CWS publish blocked — privacy practices info required in developer console (https://chrome.google.com/webstore/devconsole). Upload succeeded; complete the Privacy practices tab manually then re-publish."
            exit 0
          else
            echo "Publish may have failed — check response above."
            exit 1
          fi

  build-firefox:
    name: Build Firefox extension
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: browser-extension
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: browser-extension/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Assemble Firefox dist
        run: |
          mkdir -p dist-firefox
          cp dist/*.js dist-firefox/
          cp -r icons dist-firefox/icons
          cp popup.html dist-firefox/
          cp ../LICENSE dist-firefox/ 2>/dev/null || true
          sed 's|dist/content\.js|content.js|g; s|dist/background\.js|background.js|g' manifest.firefox.json > dist-firefox/manifest.json
      - name: Package extension (.xpi)
        run: |
          cd dist-firefox && zip -r ../grasp-firefox-extension.xpi .
      - name: Upload Firefox extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: grasp-firefox-extension
          path: browser-extension/grasp-firefox-extension.xpi
      - name: Sign Firefox extension (unlisted — attached to GitHub Release)
        if: ${{ env.AMO_JWT_ISSUER != '' }}
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          npx web-ext sign \
            --source-dir dist-firefox \
            --channel unlisted \
            --api-key "$AMO_JWT_ISSUER" \
            --api-secret "$AMO_JWT_SECRET" \
            --timeout 300000 \
          && echo "Firefox extension signed successfully." \
          || echo "WARNING: Firefox signing failed. Check GitHub Actions logs."
      - name: Upload signed Firefox .xpi to release
        if: ${{ env.AMO_JWT_ISSUER != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          XPI=$(find browser-extension -name "*.xpi" | head -1)
          if [ -n "$XPI" ]; then
            TAG="${GITHUB_REF_NAME}"
            gh release upload "$TAG" "$XPI" --clobber && echo "Uploaded $XPI to release $TAG"
          else
            echo "No signed .xpi found — skipping upload"
          fi

  build-safari:
    name: Build Safari extension
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: browser-extension/package-lock.json
      - name: Build webpack output and assemble Safari staging dir
        working-directory: browser-extension
        run: |
          npm ci
          npm run build
          node scripts/build-safari.js
      - name: Build Xcode project
        run: |
          xcodebuild -project safari-extension/Grasp/Grasp.xcodeproj \
            -scheme Grasp \
            -configuration Release \
            -archivePath ${{ runner.temp }}/Grasp.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="${{ secrets.APPLE_SIGNING_IDENTITY }}" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
          2>&1 | grep -E "error:|warning:|ARCHIVE"
      - name: Export .app for distribution
        if: ${{ env.APPLE_TEAM_ID != '' }}
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > /tmp/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>mac-application</string>
            <key>teamID</key><string>${{ secrets.APPLE_TEAM_ID }}</string>
          </dict></plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath ${{ runner.temp }}/Grasp.xcarchive \
            -exportPath ${{ runner.temp }}/export \
            -exportOptionsPlist /tmp/ExportOptions.plist
          cd ${{ runner.temp }}/export && zip -r ${{ github.workspace }}/grasp-safari-extension.zip Grasp.app
      - name: Upload Safari extension artifact
        if: ${{ env.APPLE_TEAM_ID != '' }}
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        uses: actions/upload-artifact@v4
        with:
          name: grasp-safari-extension
          path: grasp-safari-extension.zip
      - name: Submit to App Store Connect
        if: ${{ env.APPLE_API_KEY_ID != '' }}
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          echo "$APPLE_API_KEY" | base64 --decode > /tmp/AuthKey.p8
          xcrun altool --upload-app \
            -f ${{ runner.temp }}/export/Grasp.app \
            --type osx \
            --apiKey "$APPLE_API_KEY_ID" \
            --apiIssuer "$APPLE_API_ISSUER_ID" \
          && echo "Submitted to App Store Connect — review pending." \
          || echo "WARNING: App Store submission may need manual action. Check App Store Connect."

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-vscode, build-chrome, build-firefox, build-safari]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Download VS Code extension artifact
        uses: actions/download-artifact@v4
        with:
          name: grasp-vscode-vsix
          path: dist/vscode
      - name: Download JetBrains plugin artifact (if available)
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: grasp-jetbrains-signed
          path: dist/jetbrains
      - name: Download Chrome extension artifact
        uses: actions/download-artifact@v4
        with:
          name: grasp-chrome-extension
          path: dist/chrome
      - name: Download Firefox extension artifact
        uses: actions/download-artifact@v4
        with:
          name: grasp-firefox-extension
          path: dist/firefox
      - name: Download Safari extension artifact (if available)
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: grasp-safari-extension
          path: dist/safari
      - name: Build release notes
        id: notes
        run: |
          VERSION=${{ github.ref_name }}
          PREV=$(git tag --sort=-version:refname | grep '^v' | sed -n '2p')
          LOG_RANGE="${PREV:+${PREV}..HEAD}"
          get_commits() {
            local prefix=$1
            git log ${LOG_RANGE} --pretty=format:"%s" --no-merges \
              | grep -E "^${prefix}(\(.+\))?:" \
              | sed -E "s/^${prefix}(\([^)]+\))?:[[:space:]]*//" \
              | sed 's/^/- /'
          }
          FEATURES=$(get_commits "feat")
          FIXES=$(get_commits "fix")
          NOTE_FILE=/tmp/release-notes.md
          printf "## Grasp %s\n\n" "$VERSION" > "$NOTE_FILE"
          if [ -n "$FEATURES" ]; then
            printf "### New Features\n%s\n\n" "$FEATURES" >> "$NOTE_FILE"
          fi
          if [ -n "$FIXES" ]; then
            printf "### Bug Fixes\n%s\n\n" "$FIXES" >> "$NOTE_FILE"
          fi
          if [ -z "$FEATURES" ] && [ -z "$FIXES" ]; then
            printf "Maintenance release.\n\n" >> "$NOTE_FILE"
          fi
          printf "## Install\n\n" >> "$NOTE_FILE"
          printf '**MCP Server** (Claude Code, Cursor, Cline, Windsurf):\n```\nnpm install -g grasp-mcp-server\n```\n\n' >> "$NOTE_FILE"
          if [ -n "$VSCE_PAT" ]; then
            printf '**VS Code:** [Marketplace](https://marketplace.visualstudio.com/items?itemName=ashfordeOU.grasp-vscode)\n\n' >> "$NOTE_FILE"
          else
            printf '**VS Code:** Not yet on the Marketplace — install the `.vsix` directly: download `grasp-vscode-%s.vsix` from the assets below, then in VS Code run **Extensions: Install from VSIX…** (Cmd+Shift+P / Ctrl+Shift+P)\n\n' "$VERSION" >> "$NOTE_FILE"
          fi
          printf '**JetBrains:** [Marketplace](https://plugins.jetbrains.com/plugin/31362-grasp--code-architecture-visualizer) — search "Grasp" in IDE Settings → Plugins\n\n' >> "$NOTE_FILE"
          printf '**Chrome Extension:** [Chrome Web Store](https://chromewebstore.google.com/detail/grasp-%%E2%%80%%94-code-architecture/pipmlammandfhfbodllcjolgeolkhapj) — or install from the .zip asset below\n\n' >> "$NOTE_FILE"
          printf '**Firefox Extension:** [Firefox Add-ons](https://addons.mozilla.org/firefox/addon/grasp-code-architecture) — or install the .xpi asset below\n\n' >> "$NOTE_FILE"
          printf '**Safari Extension:** Install the `.zip` asset below — unzip, move `Grasp.app` to Applications, open it once, then enable in Safari Settings → Extensions (macOS 13+; see README for full sideload instructions)\n\n' >> "$NOTE_FILE"
          printf '**Docker:** `docker pull ashforde/grasp:%s`\n\n' "$VERSION" >> "$NOTE_FILE"
          printf '**Browser App:** [ashfordeOU.github.io/grasp](https://ashfordeOU.github.io/grasp)\n' >> "$NOTE_FILE"
          echo "notes_file=$NOTE_FILE" >> $GITHUB_OUTPUT
      - name: Collect release assets and generate checksums
        id: assets
        run: |
          ASSETS=""
          for f in dist/vscode/*.vsix dist/jetbrains/*.zip dist/chrome/*.zip dist/firefox/*.xpi dist/safari/*.zip; do
            [ -f "$f" ] && ASSETS="$ASSETS $f"
          done
          # SHA-256 checksums for all release assets
          if [ -n "$ASSETS" ]; then
            sha256sum $ASSETS > dist/checksums-sha256.txt
            ASSETS="$ASSETS dist/checksums-sha256.txt"
          fi
          echo "files=$ASSETS" >> $GITHUB_OUTPUT
      - name: Publish GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ github.ref_name }}
          # Delete any existing release for this tag (handles re-tags and draft leftovers)
          gh release delete "$TAG" --yes 2>/dev/null || true
          # Create fresh, published, latest release
          gh release create "$TAG" \
            --title "Grasp $TAG" \
            --latest \
            --notes-file ${{ steps.notes.outputs.notes_file }} \
            ${{ steps.assets.outputs.files }}

  publish-gitlab-app-image:
    name: Publish GitLab Bot Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push GitLab bot image
        uses: docker/build-push-action@v5
        with:
          context: gitlab-app/
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/ashfordeou/grasp-gitlab-bot:latest
            ghcr.io/ashfordeou/grasp-gitlab-bot:${{ github.ref_name }}

  publish-gitlab-agent:
    name: Build and publish GitLab tunnel agent binary
    runs-on: ubuntu-latest
    needs: [create-release]
    permissions:
      contents: write
    defaults:
      run:
        working-directory: gitlab-agent
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Build static binary
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o grasp-agent-linux-amd64 .
      - name: Upload binary to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} grasp-agent-linux-amd64 --clobber
