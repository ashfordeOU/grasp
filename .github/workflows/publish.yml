name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-npm:
    name: Publish grasp-mcp-server to npm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: mcp/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Publish to npm (skip if already published)
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "grasp-mcp-server@$VERSION" version 2>/dev/null | grep -q "$VERSION"; then
            echo "Version $VERSION already published, skipping."
          else
            npm publish
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  build-vscode:
    name: Build VS Code extension (.vsix)
    runs-on: ubuntu-latest
    needs: [publish-npm]
    defaults:
      run:
        working-directory: vscode-extension
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Package extension (.vsix)
        run: npx vsce package --no-dependencies
      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: grasp-vscode-vsix
          path: vscode-extension/*.vsix

  publish-jetbrains:
    name: Publish JetBrains plugin to Marketplace
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: jetbrains-plugin
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v4
      - name: Build and sign plugin
        run: ./gradlew signPlugin
        env:
          PLUGIN_CERTIFICATE_CHAIN: ${{ secrets.PLUGIN_CERTIFICATE_CHAIN }}
          PLUGIN_PRIVATE_KEY: ${{ secrets.PLUGIN_PRIVATE_KEY }}
          PLUGIN_PRIVATE_KEY_PASSWORD: ${{ secrets.PLUGIN_PRIVATE_KEY_PASSWORD }}
      - name: Upload signed plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: grasp-jetbrains-signed
          path: jetbrains-plugin/build/distributions/*.zip
      - name: Publish to JetBrains Marketplace
        run: ./gradlew publishPlugin
        env:
          PLUGIN_CERTIFICATE_CHAIN: ${{ secrets.PLUGIN_CERTIFICATE_CHAIN }}
          PLUGIN_PRIVATE_KEY: ${{ secrets.PLUGIN_PRIVATE_KEY }}
          PLUGIN_PRIVATE_KEY_PASSWORD: ${{ secrets.PLUGIN_PRIVATE_KEY_PASSWORD }}
          PUBLISH_TOKEN: ${{ secrets.JETBRAINS_PUBLISH_TOKEN }}

  publish-docker:
    name: Publish Docker image (multi-arch)
    runs-on: ubuntu-latest
    needs: [publish-npm]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU (for multi-arch)
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: docker/
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ashfordeou/grasp:latest
            ashfordeou/grasp:${{ github.ref_name }}
            ghcr.io/ashfordeou/grasp:latest
            ghcr.io/ashfordeou/grasp:${{ github.ref_name }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-npm, build-vscode]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Download VS Code extension artifact
        uses: actions/download-artifact@v4
        with:
          name: grasp-vscode-vsix
          path: dist/vscode
      - name: Download JetBrains plugin artifact (if available)
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: grasp-jetbrains-signed
          path: dist/jetbrains
      - name: Build release notes from git log
        id: notes
        run: |
          VERSION=${{ github.ref_name }}
          PREV=$(git tag --sort=-version:refname | grep '^v' | sed -n '2p')
          if [ -z "$PREV" ]; then
            COMMITS=$(git log --pretty=format:"- %s" --no-merges | head -20)
          else
            COMMITS=$(git log ${PREV}..HEAD --pretty=format:"- %s" --no-merges)
          fi
          cat > /tmp/release-notes.md << NOTES
          ## What's New in ${VERSION}

          ${COMMITS}

          ---

          ## Install

          **MCP Server** (works with Claude Code, Cursor, Cline, and any MCP-compatible tool):
          \`\`\`
          npm install -g grasp-mcp-server
          \`\`\`

          **VS Code:** [Marketplace](https://marketplace.visualstudio.com/items?itemName=ashfordeOU.grasp-vscode) or install the \`.vsix\` attached below

          **JetBrains:** [Marketplace](https://plugins.jetbrains.com/plugin/31362-grasp--code-architecture-visualizer) — search "Grasp" in IDE Settings → Plugins

          **Browser App:** [grasp.ashforde.org](https://ashfordeOU.github.io/grasp)

          > Signed artifacts attached for air-gapped / enterprise installs.
          NOTES
          echo "notes_file=/tmp/release-notes.md" >> $GITHUB_OUTPUT
      - name: Collect release assets
        id: assets
        run: |
          ASSETS=""
          for f in dist/vscode/*.vsix; do [ -f "$f" ] && ASSETS="$ASSETS $f"; done
          for f in dist/jetbrains/*.zip; do [ -f "$f" ] && ASSETS="$ASSETS $f"; done
          echo "files=$ASSETS" >> $GITHUB_OUTPUT
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Grasp ${{ github.ref_name }}" \
            --notes-file ${{ steps.notes.outputs.notes_file }} \
            ${{ steps.assets.outputs.files }}
