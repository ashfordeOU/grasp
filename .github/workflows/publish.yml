name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-npm:
    name: Publish grasp-mcp-server to npm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: mcp/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Publish to npm (skip if already published)
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "grasp-mcp-server@$VERSION" version 2>/dev/null | grep -q "$VERSION"; then
            echo "Version $VERSION already published, skipping."
          else
            npm publish
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  build-vscode:
    name: Build VS Code extension (.vsix)
    runs-on: ubuntu-latest
    needs: [publish-npm]
    defaults:
      run:
        working-directory: vscode-extension
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Package extension (.vsix)
        run: npx vsce package --no-dependencies
      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: grasp-vscode-vsix
          path: vscode-extension/*.vsix

  publish-jetbrains:
    name: Publish JetBrains plugin to Marketplace
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jetbrains-plugin
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v4
      - name: Build and sign plugin
        run: ./gradlew signPlugin
        env:
          PLUGIN_CERTIFICATE_CHAIN: ${{ secrets.PLUGIN_CERTIFICATE_CHAIN }}
          PLUGIN_PRIVATE_KEY: ${{ secrets.PLUGIN_PRIVATE_KEY }}
          PLUGIN_PRIVATE_KEY_PASSWORD: ${{ secrets.PLUGIN_PRIVATE_KEY_PASSWORD }}
      - name: Upload signed plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: grasp-jetbrains-signed
          path: jetbrains-plugin/build/distributions/*.zip
      - name: Publish to JetBrains Marketplace
        run: ./gradlew publishPlugin
        env:
          PLUGIN_CERTIFICATE_CHAIN: ${{ secrets.PLUGIN_CERTIFICATE_CHAIN }}
          PLUGIN_PRIVATE_KEY: ${{ secrets.PLUGIN_PRIVATE_KEY }}
          PLUGIN_PRIVATE_KEY_PASSWORD: ${{ secrets.PLUGIN_PRIVATE_KEY_PASSWORD }}
          PUBLISH_TOKEN: ${{ secrets.JETBRAINS_PUBLISH_TOKEN }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-npm, build-vscode, publish-jetbrains]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - name: Download JetBrains plugin artifact
        uses: actions/download-artifact@v4
        with:
          name: grasp-jetbrains-signed
          path: dist/jetbrains
      - name: Download VS Code extension artifact
        uses: actions/download-artifact@v4
        with:
          name: grasp-vscode-vsix
          path: dist/vscode
      - name: Create GitHub Release with assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Grasp ${{ github.ref_name }}" \
            --notes "## Install

**MCP Server (CLI + agents):** \`npm install -g grasp-mcp-server\`
**VS Code:** [VS Code Marketplace](https://marketplace.visualstudio.com/items?itemName=ashfordeOU.grasp-vscode)
**JetBrains:** [JetBrains Marketplace](https://plugins.jetbrains.com/plugin/31362-grasp--code-architecture-visualizer)

Manual installs are attached below — useful for air-gapped or enterprise environments." \
            dist/jetbrains/*.zip \
            dist/vscode/*.vsix
