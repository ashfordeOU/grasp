name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'CHANGELOG.md'
      - 'CONTRIBUTING.md'
      - 'PRIVACY.md'
      - '**.png'
      - '**.jpg'
      - '**.svg'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'CHANGELOG.md'
      - 'CONTRIBUTING.md'
      - 'PRIVACY.md'
      - '**.png'
      - '**.jpg'
      - '**.svg'

jobs:
  mcp:
    name: MCP Server — build + typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: mcp
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mcp/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: ./node_modules/.bin/tsc --noEmit -p tsconfig.check.json
      - run: npm test
      - run: npm run build
      - name: Pack for vscode job
        run: npm pack
      - uses: actions/upload-artifact@v4
        with:
          name: mcp-tarball
          path: mcp/grasp-mcp-server-*.tgz
          retention-days: 1

  vscode:
    name: VS Code Extension — build + typecheck
    needs: [mcp]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: vscode-extension
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json
      - uses: actions/download-artifact@v4
        with:
          name: mcp-tarball
          path: mcp-tarball
      - name: Install with local mcp build
        run: |
          npm ci
          TARBALL=$(ls ../mcp-tarball/grasp-mcp-server-*.tgz)
          rm -rf node_modules/grasp-mcp-server
          mkdir -p node_modules/grasp-mcp-server
          tar xzf "$TARBALL" -C node_modules/grasp-mcp-server --strip-components=1
      - run: ./node_modules/.bin/tsc --noEmit
      - run: npm run build
