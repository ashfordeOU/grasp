name: Grasp Health Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  grasp-health:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Grasp analysis
        id: grasp
        run: |
          # Install grasp CLI
          npm install -g grasp-mcp-server 2>/dev/null || npx --yes grasp-mcp-server@latest --version || true

          # Run terminal report — outputs JSON summary to a temp file
          cat > /tmp/grasp_runner.mjs << 'RUNNER'
          import { analyzeSource, parseSource } from 'grasp-mcp-server/dist/analyzer.js';

          const ws = process.env.GITHUB_WORKSPACE || process.cwd();
          try {
            const src = parseSource(ws, null);
            const result = await analyzeSource(src, () => {});
            const s = result.summary;
            const out = {
              score: s.healthScore,
              grade: s.healthGrade,
              files: s.fileCount,
              codeFiles: s.codeFileCount,
              functions: s.functionCount,
              issues: s.issueCount,
              critical: s.criticalIssueCount,
              cycles: s.circularDepCount,
              security: s.securityIssueCount,
              layers: s.layers,
              topFolders: s.topFolders,
              sessionId: result.sessionId,
            };
            process.stdout.write(JSON.stringify(out));
          } catch(e) {
            process.stderr.write(e.message + '\n');
            process.stdout.write('{}');
          }
          RUNNER

          node /tmp/grasp_runner.mjs > /tmp/grasp_result.json 2>/tmp/grasp_err.txt || echo '{}' > /tmp/grasp_result.json

          # Parse results into GITHUB_OUTPUT
          node << 'PARSE'
          const fs = require('fs');
          let d = {};
          try { d = JSON.parse(fs.readFileSync('/tmp/grasp_result.json', 'utf8')); } catch(e) {}
          const set = (k, v) => fs.appendFileSync(process.env.GITHUB_OUTPUT, `${k}=${v}\n`);
          set('score',    d.score    ?? '?');
          set('grade',    d.grade    ?? '?');
          set('files',    d.files    ?? '?');
          set('functions',d.functions?? '?');
          set('issues',   d.issues   ?? '?');
          set('critical', d.critical ?? '0');
          set('cycles',   d.cycles   ?? '0');
          set('security', d.security ?? '0');
          set('layers',   (d.layers||[]).join(', ') || 'none detected');
          PARSE

      - name: Get changed files
        id: changed
        run: |
          # Get list of changed code files in this PR
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep -E '\.(ts|tsx|js|jsx|py|go|rs|java|rb|php|cs|cpp|c|h)$' \
            | head -20 \
            | tr '\n' ',' | sed 's/,$//' || echo '')
          echo "files=$CHANGED" >> $GITHUB_OUTPUT
          echo "count=$(echo "$CHANGED" | tr ',' '\n' | grep -c '.' || echo 0)" >> $GITHUB_OUTPUT

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const score    = '${{ steps.grasp.outputs.score }}';
            const grade    = '${{ steps.grasp.outputs.grade }}';
            const files    = '${{ steps.grasp.outputs.files }}';
            const funcs    = '${{ steps.grasp.outputs.functions }}';
            const issues   = '${{ steps.grasp.outputs.issues }}';
            const critical = '${{ steps.grasp.outputs.critical }}';
            const cycles   = '${{ steps.grasp.outputs.cycles }}';
            const security = '${{ steps.grasp.outputs.security }}';
            const layers   = '${{ steps.grasp.outputs.layers }}';
            const changedFiles  = '${{ steps.changed.outputs.files }}';
            const changedCount  = '${{ steps.changed.outputs.count }}';

            const scoreNum = parseFloat(score);
            const gradeEmoji = {A:'🟢',B:'🟡',C:'🟠',D:'🔴',F:'🔴'}[grade] || '⚪';
            const bar = !isNaN(scoreNum)
              ? '`' + '█'.repeat(Math.round(scoreNum/10)) + '░'.repeat(10-Math.round(scoreNum/10)) + '`'
              : '';

            const critBadge  = parseInt(critical)  > 0 ? ` ⚠️ ${critical} critical` : '';
            const secBadge   = parseInt(security)   > 0 ? ` 🔐 ${security} security`  : '';
            const cycleBadge = parseInt(cycles)     > 0 ? ` 🔄 ${cycles} circular`    : '';

            // Changed files section
            const changedList = changedFiles ? changedFiles.split(',').filter(Boolean) : [];
            const changedSection = changedList.length > 0
              ? [
                  '',
                  '### 📝 Changed Files in This PR',
                  '',
                  changedList.map(f => `- \`${f}\``).join('\n'),
                  changedList.length >= 20 ? '_…and more_' : '',
                  '',
                  `> ℹ️ Run \`npx grasp .\` locally to see blast radius for each changed file.`,
                ].join('\n')
              : '';

            const body = [
              '## 📊 Grasp Health Report',
              '',
              `| Metric | Value |`,
              `|--------|-------|`,
              `| **Health Score** | ${bar} **${score}/100** |`,
              `| **Grade** | ${gradeEmoji} **${grade}** |`,
              `| **Files** | ${files} (${funcs} functions) |`,
              `| **Architecture Issues** | ${issues}${critBadge} |`,
              `| **Circular Deps** | ${cycles}${cycleBadge ? '' : ' ✓'} |`,
              `| **Security** | ${security}${secBadge} |`,
              `| **Layers** | ${layers} |`,
              `| **Changed Files** | ${changedCount} code files in this PR |`,
              changedSection,
              '',
              '<details><summary>ℹ️ What is Grasp?</summary>',
              '',
              '[Grasp](https://github.com/ashfordeOU/grasp) analyses your codebase architecture: dead code, circular dependencies, layer violations, and security patterns. Score 0–100; grade A (excellent) to F (critical issues).',
              '',
              'Add this workflow to your repo with:',
              '```yaml',
              '# .github/workflows/grasp.yml',
              'on: [pull_request]',
              'jobs:',
              '  health:',
              '    uses: ashfordeOU/grasp/.github/workflows/grasp-health.yml@main',
              '```',
              '',
              '</details>',
            ].join('\n');

            // Find existing Grasp comment and update, or create new
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes('📊 Grasp Health Report'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
