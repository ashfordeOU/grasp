            if(sessionCache.current[k])return Promise.resolve({data:sessionCache.current[k].data,repoInfo:sessionCache.current[k].repoInfo});
            return GraspDB.load(k).then(function(e){return e?{data:e.data,repoInfo:e.repoInfo}:null;});
        })).then(function(results){
            if(results.every(Boolean)){
                setCompareData(results.map(function(r,i){
                    var meta=sessions.find(function(s){return s.repo===keys[i];})||{repo:keys[i],displayName:keys[i]};
                    return{data:r.data,meta:meta};
                }));
                setShowCompare(true);
                setShowSessions(false);
                setCompareMode(false);
                setCompareSelected([]);
            }
        });
    }

    function parseUrl(url){
        if(!url||typeof url!=='string')return{error:'Please enter a repository URL or owner/repo'};
        url=url.trim().replace(/\.git$/,'');
        if(!url)return{error:'Please enter a repository URL or owner/repo'};
        if(url.length>300)return{error:'URL is too long'};
        if(url.includes('{'))return{error:'Invalid URL format'};
        // Format: https://github.com/owner/repo[/...]
        var m=url.match(/github\.com\/([a-zA-Z0-9_.-]+)\/([a-zA-Z0-9_.-]+)/);
        if(m)return{owner:m[1],repo:m[2]};
        // GitLab URL — return a typed result; analysis handled via MCP/bot
        if(isGitLabUrl(url)){
            var gl=parseGitLabInput(url);
            if(gl&&gl.namespace&&gl.project){return{type:'gitlab',host:gl.host,namespace:gl.namespace,project:gl.project};}
            return{error:'Invalid GitLab URL. Use format: gitlab.com/namespace/project'};
        }
        // Format: owner/repo
        var simple=url.match(/^([a-zA-Z0-9_.-]+)\/([a-zA-Z0-9_.-]+)$/);
        if(simple)return{owner:simple[1],repo:simple[2]};
        // Single word — probably missing slash
        if(/^[a-zA-Z0-9_.-]+$/.test(url))return{error:'Missing repo name. Use format: owner/repo'};
        return{error:'Invalid format. Use "owner/repo" or a GitHub URL.'};
    }

    function isGitLabUrl(input){
        return /gitlab\./i.test(input||'');
    }

    function parseGitLabInput(input){
        var cleaned=(input||'').trim().replace(/\.git$/,'');
        var m=cleaned.match(/(?:https?:\/\/)?([^/]*gitlab[^/]*)\/(.+)/i);
        if(!m)return null;
        var parts=m[2].split('/');
        var project=parts.pop();
        var namespace=parts.join('/');
        return{host:m[1],namespace:namespace,project:project,path:m[2]};
    }

    function loadGitHubIssues(){
        if(!repoInfo||!repoInfo.owner||!repoInfo.repo){setToast({msg:'Load a GitHub repo first',type:'warn'});return;}
        setIssuesLoading(true);
        var headers={'Accept':'application/vnd.github.v3+json'};
        if(token)headers['Authorization']='Bearer '+token;
        var pages=[1,2,3,4,5]; // up to 500 issues
        var allIssues=[];
        Promise.all(pages.map(function(p){
            return fetch('https://api.github.com/repos/'+repoInfo.owner+'/'+repoInfo.repo+'/issues?state=open&per_page=100&page='+p,{headers:headers})
                .then(function(r){return r.ok?r.json():[];}).catch(function(){return[];});
        })).then(function(results){
            results.forEach(function(r){if(Array.isArray(r))allIssues=allIssues.concat(r);});
            // Build file mention map
            var mentionMap=new Map();
            allIssues.forEach(function(issue){
                var text=(issue.title||'')+' '+(issue.body||'');
                data&&data.files&&data.files.forEach(function(f){
                    // Match by filename or path segments
                    if(text.includes(f.name)||(f.path.includes('/')&&text.includes(f.path.split('/').pop()))){
                        mentionMap.set(f.path,(mentionMap.get(f.path)||0)+1);
                    }
                });
            });
            setIssuesData(mentionMap);
            setIssuesLoading(false);
            setColorMode('issues');
            setToast({msg:'Loaded '+allIssues.length+' issues, matched '+mentionMap.size+' files',type:'ok'});
        }).catch(function(e){setIssuesLoading(false);setToast({msg:'Failed to load issues: '+e.message,type:'error'});});
    }

    function analyze(force){
        var p=parseUrl(repoUrl);
        if(p.error){setError(p.error);return;}
        if(p.type==='gitlab'){
            setError('GitLab analysis requires the Grasp MCP server or bot. Run: npx grasp-mcp-server — or set up the GitLab bot for automated MR comments.');
            return;
        }

        // Validate authentication inputs
        if(authMethod==='pat'&&!token){
            setError('Please enter a Personal Access Token');return;
        }
        if(authMethod==='github_app'){
            if(!appId){setError('Please enter the GitHub App ID');return;}
            if(!privateKey){setError('Please set the GitHub App private key');return;}
        }

        // Cache-first: serve from memory/IndexedDB unless the user explicitly refreshes or it's a local folder
        if(!force&&!localDirHandle){
            var repoKey=p.owner+'/'+p.repo;
            var mem=sessionCache.current[repoKey];
            if(mem){
                setData(mem.data);setRepoInfo(mem.repoInfo);
                setSelected(null);setBlastRadius(null);setError(null);setLoading(false);
                return;
            }
            setLoading(true);setProgress('Loading cached analysis...');setError(null);setData(null);
            GraspDB.load(repoKey).then(function(entry){
                if(entry){
                    sessionCache.current[repoKey]={data:entry.data,repoInfo:entry.repoInfo,timestamp:entry.timestamp};
                    setData(entry.data);setRepoInfo(entry.repoInfo);
                    setSelected(null);setBlastRadius(null);setLoading(false);
                }else{
                    // Nothing cached — fall through to a full GitHub fetch
                    setLoading(false);
                    analyze(true);
                }
            }).catch(function(){setLoading(false);analyze(true);});
            return;
        }

        cancelRef.current=false;
        setError(null);setData(null);setSelected(null);setBlastRadius(null);setLoading(true);setProgress('Initializing...');setFolderFilter(null);
        
        // Configure GitHub authentication based on method
        GitHub.token=null;
        GitHub.appId=null;
        GitHub.privateKey=null;
        GitHub.installationToken=null;
        
        if(authMethod==='pat'){
            GitHub.token=token;
        }else if(authMethod==='github_app'){
            GitHub.appId=appId;
            GitHub.privateKey=privateKey;
        }
        
        setRepoInfo(p);

        // Authentication promise - resolve immediately for no auth/PAT, authenticate for GitHub App
        var authPromise;
        if(authMethod==='github_app'){
            setProgress('Authenticating with GitHub App...');
            authPromise=GitHub.authenticateApp(p.owner,p.repo).catch(function(err){
                throw new Error('GitHub App authentication failed: '+err.message);
            });
        }else{
            authPromise=Promise.resolve();
        }
        
        authPromise.then(function(){
            setProgress('Checking rate limit...');
            return GitHub.getRateLimit();
        }).then(async function(rl){
            var hasAuth=!!GitHub.token||authMethod==='github_app';
            var estimatedRequests=50;// Conservative estimate for a small-medium repo

            // Warn if rate limit is very low and no authentication
            if(!hasAuth&&rl.remaining<estimatedRequests){
                var resetTime=new Date(rl.reset*1000).toLocaleTimeString();
                var proceed=await new Promise(function(res){setRateLimitConfirm({remaining:rl.remaining,limit:rl.limit,resetTime:resetTime,resolve:res});});
                setRateLimitConfirm(null);
                if(!proceed){setLoading(false);return Promise.reject('cancelled');}
            }

            setProgress('Scanning repository...');
            return GitHub.scan(p.owner,p.repo,setProgress);
        }).then(async function(files){
            if(!files)return;// Cancelled
            if(!files.length)throw new Error('No code files found');
            var SOFT_LIMIT=500,HARD_LIMIT=10000;
            if(files.length>SOFT_LIMIT&&files.length<=HARD_LIMIT){
                var proceed=await new Promise(function(res){setLargeRepoConfirm({count:files.length,resolve:res});});
                setLargeRepoConfirm(null);
                if(!proceed){setLoading(false);return;}
            }else if(files.length>HARD_LIMIT){
                showNotification('Found '+files.length+' files. Limiting to '+HARD_LIMIT+' for performance.','warning');
            }
            var max=Math.min(files.length,HARD_LIMIT);
            var analyzed=[];
            var allFns=[];

            // Concurrent fetch pool — fetches up to CONCURRENCY files in parallel
            // Rate-limit aware: reduces concurrency when remaining requests are low
            async function processFiles(){
                var idx=0;
                var completed=0;
                var CONCURRENCY=GitHub.rateLimit.remaining>200?THRESHOLDS.fetchConcurrency:GitHub.rateLimit.remaining>50?5:2;
                async function worker(){
                    while(idx<max){
                        if(cancelRef.current){return;}
                        var i=idx++;
                        var f=files[i];
                        var isCodeFile=f.isCode!==false&&Parser.isCode(f.name);
                        try{
                            if(isCodeFile){
                                var results=await Promise.all([
                                    GitHub.getFile(p.owner,p.repo,f.path),
                                    GitHub.getCommits(p.owner,p.repo,f.path,10).catch(function(){return[];})
                                ]);
                                var content=results[0],commits=results[1];
                                if(content){
                                    var fns=Parser.extract(content,f.path);
                                    var layer=Parser.detectLayer(f.path);
                                    analyzed[i]={path:f.path,name:f.name,folder:f.folder,content:content,functions:fns,lines:content.split('\n').length,layer:layer,churn:Array.isArray(commits)?commits.length:0,isCode:true};
                                    fns.forEach(function(fn){allFns.push(Object.assign({},fn,{folder:f.folder,layer:layer}));});
                                }else{
                                    analyzed[i]={path:f.path,name:f.name,folder:f.folder,content:'',functions:[],lines:0,layer:Parser.detectLayer(f.path),churn:0,isCode:false};
                                }
                            }else{
                                var content=await GitHub.getFile(p.owner,p.repo,f.path).catch(function(){return '';});
                                var layer=Parser.detectLayer(f.path);
                                analyzed[i]={path:f.path,name:f.name,folder:f.folder,content:content||'',functions:[],lines:content?content.split('\n').length:0,layer:layer,churn:0,isCode:false};
                            }
                        }catch(e){
                            console.warn('[Grasp] Failed to process',f.path,e.message||e);
                            analyzed[i]={path:f.path,name:f.name,folder:f.folder,content:'',functions:[],lines:0,layer:Parser.detectLayer(f.path),churn:0,isCode:false};
                        }
                        completed++;
                        setProgress('Fetching files... '+completed+'/'+max+' ('+CONCURRENCY+'× parallel)');
                    }
                }
                analyzed=new Array(max);
                await Promise.all(Array.from({length:CONCURRENCY},worker));
                // Filter out holes (files that were never fetched due to cancellation)
                analyzed=analyzed.filter(Boolean);
                if(cancelRef.current){setLoading(false);return;}
                await finishAnalysis();
            }

            async function finishAnalysis(){
                try{
                // Initialize tree-sitter Python parser (async WASM load, runs in parallel)
                Parser.initTreeSitter();
                // Phase 1: Build function stats index
                setProgress('Building dependency graph (1/5)...');
                await new Promise(function(r){setTimeout(r,0);});
                var fnNames=[...new Set(allFns.map(function(f){return f.name;}))];
                var conns=[];
                var fnStats={};
                // Initialize fnStats with additional metadata for accurate unused detection
                allFns.forEach(function(fn){
                    if(!fnStats[fn.name]){
                        fnStats[fn.name]={
                            internal:0,
                            external:0,
                            callers:new Map(),
                            file:fn.file,
                            folder:fn.folder,
                            line:fn.line,
                            code:fn.code,
                            isTopLevel:fn.isTopLevel!==false,  // Default to true for backward compat
                            isExported:fn.isExported||false,
                            isClassMethod:fn.isClassMethod||false,
                            type:fn.type||'function',
                            decorators:fn.decorators||null,
                            className:fn.className||null
                        };
                    }
                });

                // Wait for tree-sitter to finish loading (started in parallel during Phase 1)
                await Parser.initTreeSitter();
                // Pre-compile call patterns once — avoids 500K+ RegExp compilations
                var precompiledCallPatterns=Parser.prepareCallPatterns(fnNames);
                // Phase 2: Find calls in batches with yielding to prevent UI freeze
                var CALL_BATCH=30;
                for(var bi=0;bi<analyzed.length;bi+=CALL_BATCH){
                    var batchEnd=Math.min(bi+CALL_BATCH,analyzed.length);
                    setProgress('Analyzing dependencies (2/5)... '+batchEnd+'/'+analyzed.length+' files');
                    for(var fi=bi;fi<batchEnd;fi++){
                        var file=analyzed[fi];
                        if(!file.content)continue;
                        // Pass file path and all function defs for accurate call detection
                        var calls=Parser.findCalls(file.content,fnNames,file.path,allFns,precompiledCallPatterns);
                        Object.entries(calls).forEach(function(entry){
                            var fn=entry[0],cnt=entry[1];
                            // Only process if there are actual calls (cnt > 0)
                            if(cnt<=0)return;
                            var def=fnStats[fn]?fnStats[fn].file:null;
                            if(def){
                                if(def===file.path){
                                    fnStats[fn].internal+=cnt;
                                }else{
                                    conns.push({source:def,target:file.path,fn:fn,count:cnt});
                                    var ex=fnStats[fn].callers.get(file.path);
                                    if(ex)ex.count+=cnt;else fnStats[fn].callers.set(file.path,{file:file.path,name:file.name,count:cnt});
                                    fnStats[fn].external+=cnt;
                                }
                            }
                        });
                    }
                    // Yield to browser between batches
                    await new Promise(function(r){setTimeout(r,0);});
                }
                Object.values(fnStats).forEach(function(s){s.callers=Array.from(s.callers.values());s.count=s.internal+s.external;});
                var issues=[];
                // Only flag truly unused functions with language-aware filtering
                // Understands Python decorators, framework conventions, magic methods, etc.
                var deadFns=Object.entries(fnStats).filter(function(x){
                    var name=x[0],stats=x[1];
                    // Skip if has any calls (internal or external)
                    if(stats.internal>0||stats.external>0)return false;
                    // Skip class methods - they're called via instance
                    if(stats.isClassMethod)return false;
                    // Skip nested functions - they're private to their scope
                    if(!stats.isTopLevel)return false;
                    // Python-aware: skip decorated functions (framework-registered: routes, signals, etc.)
                    if(stats.decorators&&stats.decorators.length>0)return false;
                    // Python-aware: skip classes (instantiated dynamically, registered by frameworks)
                    if(stats.type==='class'||stats.type==='dataclass'||stats.type==='abstract_class')return false;
                    // Python-aware: skip dunder/magic methods (__init__, __str__, __enter__, etc.)
                    var baseName=name.includes('.')?name.split('.').pop():name;
                    if(baseName.startsWith('__')&&baseName.endsWith('__'))return false;
                    // Python-aware: skip test functions (discovered by pytest/unittest)
                    if(baseName.startsWith('test_')||baseName==='setUp'||baseName==='tearDown'||baseName==='setUpClass'||baseName==='tearDownClass')return false;
                    if(stats.file&&(stats.file.includes('test_')||stats.file.includes('_test.')||stats.file.includes('/tests/')))return false;
                    // Python-aware: skip migration functions (Alembic upgrade/downgrade)
                    if((baseName==='upgrade'||baseName==='downgrade')&&stats.file&&(stats.file.includes('migration')||stats.file.includes('alembic')||stats.file.includes('versions')))return false;
                    // Python-aware: skip common framework entry points and hooks
                    if(['main','create_app','make_app','get_app','setup','configure','register','on_startup','on_shutdown','lifespan'].indexOf(baseName)>=0)return false;
                    // JS/TS: skip explicitly exported functions (module exports are meant for external consumption)
                    // The export keyword is an explicit declaration of public API - if call detection
                    // can't find usage, it's a detection gap, not genuinely dead code
                    if(stats.isExported&&stats.file&&/\.[jt]sx?$/.test(stats.file))return false;
                    // Skip functions in test/spec files (broader pattern)
                    if(stats.file&&(/\.(?:spec|test)\.[jt]sx?$/.test(stats.file)||stats.file.includes('__tests__')))return false;
                    // This is a top-level function with zero calls and no framework registration
                    return true;
                });
                if(deadFns.length)issues.push({type:'warning',title:deadFns.length+' Unused Functions',desc:'Functions not called from other files',items:deadFns.map(function(x){return{name:x[0],file:x[1].file,line:x[1].line,code:x[1].code};})});
                var godFiles=analyzed.filter(function(f){return f.functions.length>THRESHOLDS.maxFunctionsPerFile;});
                if(godFiles.length)issues.push({type:'critical',title:godFiles.length+' Large Files',desc:'Files with '+THRESHOLDS.maxFunctionsPerFile+'+ functions',items:godFiles.map(function(f){return{name:f.name+' ('+f.functions.length+' fns)',file:f.path,fns:f.functions.length,lines:f.lines};})});
                var coupling={};
                conns.forEach(function(c){coupling[c.target]=(coupling[c.target]||0)+1;});
                var highCoup=Object.entries(coupling).filter(function(x){return x[1]>THRESHOLDS.maxCouplingIn;}).sort(function(a,b){return b[1]-a[1];});
                if(highCoup.length)issues.push({type:'warning',title:highCoup.length+' Highly Coupled',desc:'Files imported by '+THRESHOLDS.maxCouplingIn+'+ others',items:highCoup.map(function(x){return{name:x[0].split('/').pop()+' ('+x[1]+' imports)',file:x[0],imports:x[1]};})});
                // DFS-based cycle detection — finds A↔B, A→B→C→A, and longer chains
                var adjMap={};
                conns.forEach(function(c){if(!adjMap[c.source])adjMap[c.source]=[];adjMap[c.source].push(c.target);});
                var allNodes=Object.keys(adjMap);
                var visited=new Set();
                var circular=[];
                var seenCycleKeys=new Set();
                allNodes.forEach(function(start){
                    if(visited.has(start))return;
                    var stack=[start];
                    var stackSet=new Set([start]);
                    var stackPath={};
                    stackPath[start]=null;
                    while(stack.length){
                        var node=stack[stack.length-1];
                        var neighbors=adjMap[node]||[];
                        var pushed=false;
                        for(var ni=0;ni<neighbors.length;ni++){
                            var nb=neighbors[ni];
                            if(stackSet.has(nb)){
                                // Found a cycle — extract it
                                var cycle=[];
                                var cur=node;
                                while(cur!==nb){cycle.unshift(cur);cur=stackPath[cur];}
                                cycle.unshift(nb);
                                var canonical=[].concat(cycle).sort().join('|');
                                if(!seenCycleKeys.has(canonical)){seenCycleKeys.add(canonical);circular.push(cycle);}
                            } else if(!visited.has(nb)){

                            }
                        }
                        if(!pushed){visited.add(node);stack.pop();stackSet.delete(node);}
                    }
                });
                if(circular.length)issues.push({type:'critical',title:circular.length+' Circular Dependencies',desc:'Files in import cycles (including multi-hop)',items:circular.map(function(cycle){return{name:cycle.map(function(x){return x.split('/').pop();}).join(' → ')+' → '+cycle[0].split('/').pop(),files:cycle};})});

                // Phase 3: Pattern and security detection with yielding
                setProgress('Detecting patterns (3/5)...');
                await new Promise(function(r){setTimeout(r,0);});
                var patterns=Parser.detectPatterns(analyzed);
                var securityIssues=Parser.detectSecurity(analyzed);

                // Phase 4: Duplicate detection and complexity
                setProgress('Analyzing code quality (4/5)...');
                await new Promise(function(r){setTimeout(r,0);});
                var duplicates=Parser.detectDuplicates(analyzed,allFns);
                var layerViolations=Parser.detectLayerViolations(analyzed,conns);
                // Add complexity to each file in batches
                for(var ci=0;ci<analyzed.length;ci+=CALL_BATCH){
                    var cEnd=Math.min(ci+CALL_BATCH,analyzed.length);
                    for(var cj=ci;cj<cEnd;cj++){
                        analyzed[cj].complexity=Parser.calcComplexity(analyzed[cj].content,analyzed[cj].path);
                        analyzed[cj].nestingDepth=calcNestingDepth(analyzed[cj].content);
                    }
                    if(ci+CALL_BATCH<analyzed.length)await new Promise(function(r){setTimeout(r,0);});
                }

                // Phase 5: Free file content from memory (can be re-fetched for preview)
                setProgress('Finalizing (5/5)...');
                await new Promise(function(r){setTimeout(r,0);});
                analyzed.forEach(function(f){f.content=null;});

                var folders=[...new Set(analyzed.map(function(f){return f.folder;}))].sort();
                var tree=buildTree(analyzed);
                var totalLoc=analyzed.reduce(function(s,f){return s+f.lines;},0);
                var langStats={};
                analyzed.forEach(function(f){var ext=f.name.split('.').pop().toLowerCase();langStats[ext]=(langStats[ext]||0)+f.lines;});
                var langArray=Object.entries(langStats).sort(function(a,b){return b[1]-a[1];}).map(function(e){return{ext:e[0],lines:e[1],pct:Math.round(e[1]/totalLoc*100)};});
                // Add duplicate issues - include ALL items
                if(duplicates.length>0){
                    var nameDups=duplicates.filter(function(d){return d.type==='name';});
                    var codeDups=duplicates.filter(function(d){return d.type==='code';});
                    if(nameDups.length)issues.push({type:'warning',title:nameDups.length+' Duplicate Function Names',desc:'Same function name in multiple files',items:nameDups.map(function(d){return{name:d.name+' ('+d.count+' files)',suggestion:d.suggestion,files:d.files,count:d.count};})});
                    if(codeDups.length)issues.push({type:'warning',title:codeDups.length+' Similar Code Blocks',desc:'Copy-paste code detected',items:codeDups.map(function(d){return{name:d.name,suggestion:d.suggestion,files:d.files};})});
                }
                if(layerViolations.length>0){
                    issues.push({type:'critical',title:layerViolations.length+' Architecture Violations',desc:'Lower layers importing from higher layers',items:layerViolations.map(function(v){return{name:v.fromLayer+' → '+v.toLayer,file:v.from,toFile:v.to,fn:v.fn,suggestion:v.suggestion};})});
                }
                var highComplexity=analyzed.filter(function(f){return f.complexity&&f.complexity.level==='critical';}).sort(function(a,b){return b.complexity.score-a.complexity.score;});
                if(highComplexity.length)issues.push({type:'warning',title:highComplexity.length+' High Complexity Files',desc:'Files with complexity score >30',items:highComplexity.map(function(f){return{name:f.name+' ('+f.complexity.score+')',file:f.path,score:f.complexity.score,lines:f.lines};})});
                var dataObj={files:analyzed,functions:allFns,connections:conns,fnStats:fnStats,folders:folders,tree:tree,issues:issues,patterns:patterns,securityIssues:securityIssues,duplicates:duplicates,layerViolations:layerViolations,deadFunctions:deadFns.map(function(x){var codeLines=x[1].code?x[1].code.split('\n').length:0;return{name:x[0],file:x[1].file,folder:x[1].folder,line:x[1].line,code:x[1].code,codeLines:codeLines,ext:x[1].file.split('.').pop()};}),stats:{files:analyzed.length,functions:allFns.length,connections:conns.length,dead:deadFns.length,patterns:patterns.length,security:securityIssues.filter(function(i){return i.severity==='high';}).length,duplicates:duplicates.length,violations:layerViolations.length,loc:totalLoc,languages:langArray}};
                dataObj.suggestions=Parser.generateSuggestions(dataObj);
                dataObj.testCoverage=buildTestCoverageMap(analyzed,conns);
                // Apply custom architecture rules
                var archRules=loadArchRules();
                dataObj.archRuleViolations=applyArchitectureRules(analyzed,conns,archRules);
                if(dataObj.archRuleViolations.length)issues.push({type:'critical',title:dataObj.archRuleViolations.length+' Custom Rule Violations',desc:'Violations of custom architecture rules',items:dataObj.archRuleViolations.slice(0,20).map(function(v){return{name:v.fromLayer+'→'+v.toLayer+': '+v.reason,file:v.from,toFile:v.to};})});
                // Stamp analysis time for update-detection polling
                dataObj.analyzedAt=new Date().toISOString();
                setRepoUpdateAvailable(false);
                // Save snapshot for history
                saveSnapshot(dataObj,p.owner+'/'+p.repo);
                saveToSessionCache(p.owner+'/'+p.repo,dataObj,{owner:p.owner,repo:p.repo,name:p.repo},p.owner+'/'+p.repo);
                setData(dataObj);
                setExpandedPaths(new Set(['']));
                var newUrl=window.location.pathname+'?repo='+encodeURIComponent(p.owner+'/'+p.repo);
                window.history.replaceState({},'',newUrl);
                setLoading(false);
                }catch(err){
                    setError('Analysis failed: '+(err.message||err)+'. Try a smaller repository.');
                    setLoading(false);
                }
            }

            processFiles().catch(function(e){if(e!=='cancelled'){setError(e.message||e);setLoading(false);}});
        }).catch(function(e){if(e&&e!=='cancelled'){setError(e.message||e);setLoading(false);}});
    }

    async function readLocalFolder(dirHandle, path=''){
        var files=[];
        var SOFT_LIMIT=500,HARD_LIMIT=10000;
        var fileCount=0;
        // Cache directory handles by path to avoid O(n²) re-traversal in processFile
        var dirHandleCache={'':dirHandle};

        async function readDirectory(handle, currentPath){
            for await (const entry of handle.values()){
                if(fileCount>=HARD_LIMIT)break;
                var entryPath=currentPath?currentPath+'/'+entry.name:entry.name;
                if(entry.kind==='directory'){
                    if(!isIgnored(entry.name)&&!entry.name.endsWith('.egg-info')){
                        dirHandleCache[entryPath]=entry;  // Cache for O(1) later lookup
                        await readDirectory(entry,entryPath);
                    }
                }else if(entry.kind==='file'){
                    var name=entry.name;
                    if(!Parser.isIncluded(name))continue;
                    var folder=currentPath||'root';
                    files.push({path:entryPath,name:name,folder:folder,size:0,isCode:Parser.isCode(name)});
                    fileCount++;
                    if(fileCount%50===0)setProgress('Scanning files... '+fileCount+' found');
                }
            }
        }

        await readDirectory(dirHandle,'');
        
        if(files.length>SOFT_LIMIT&&files.length<=HARD_LIMIT){
            var proceed=await new Promise(function(res){setLargeRepoConfirm({count:files.length,resolve:res,isLocal:true});});
            setLargeRepoConfirm(null);
            if(!proceed){setLoading(false);return;}
        }else if(files.length>HARD_LIMIT){
            showNotification('Found '+files.length+' files. Limiting to '+HARD_LIMIT+' for performance.','warning');
        }
        var max=Math.min(files.length,HARD_LIMIT);
        var analyzed=[];
        var allFns=[];

        async function processFiles(){
            for(var i=0;i<max;i++){
                var f=files[i];
                // Yield to browser every 50 files to keep UI responsive
                if(i>0&&i%50===0)await new Promise(function(r){setTimeout(r,0);});
                setProgress('Analyzing '+(i+1)+'/'+max+': '+f.name);
                var isCodeFile=f.isCode!==false&&Parser.isCode(f.name);
                // Get file handle from cache — O(1) instead of O(n) per file
                var parts=f.path.split('/');
                var dirKey=parts.slice(0,-1).join('/');
                var currentHandle=dirHandleCache[dirKey]||dirHandle;
                try{
                    var fileHandle=await currentHandle.getFileHandle(parts[parts.length-1]);
                    var fileObj=await fileHandle.getFile();
                    var content=await fileObj.text();
                    var layer=Parser.detectLayer(f.path);
                    if(isCodeFile){
                        var fns=Parser.extract(content,f.path);
                        analyzed.push({path:f.path,name:f.name,folder:f.folder,content:content,functions:fns,lines:content.split('\n').length,layer:layer,churn:0,isCode:true});
                        fns.forEach(function(fn){allFns.push(Object.assign({},fn,{folder:f.folder,layer:layer}));});
                    }else{
                        analyzed.push({path:f.path,name:f.name,folder:f.folder,content:content||'',functions:[],lines:content?content.split('\n').length:0,layer:layer,churn:0,isCode:false});
                    }
                }catch(e){
                    console.warn('[Grasp] Failed to read',f.path,e.message||e);
                    analyzed.push({path:f.path,name:f.name,folder:f.folder,content:'',functions:[],lines:0,layer:Parser.detectLayer(f.path),churn:0,isCode:false});
                }
            }
        }

        async function finishAnalysis(){
            try{
            // Initialize tree-sitter Python parser (async WASM load, runs in parallel)
            Parser.initTreeSitter();
            // Phase 1: Build function stats index
            setProgress('Building dependency graph (1/5)...');
            await new Promise(function(r){setTimeout(r,0);});
            var fnNames=[...new Set(allFns.map(function(f){return f.name;}))];
            var conns=[];
            var fnStats={};
            allFns.forEach(function(fn){
                if(!fnStats[fn.name]){
                    fnStats[fn.name]={
                        internal:0,
                        external:0,
                        callers:new Map(),
                        file:fn.file,
                        folder:fn.folder,
                        line:fn.line,
                        code:fn.code,
                        isTopLevel:fn.isTopLevel!==false,
                        isExported:fn.isExported||false,
                        isClassMethod:fn.isClassMethod||false,
                        type:fn.type||'function',
                        decorators:fn.decorators||null,
                        className:fn.className||null
                    };
                }
            });

            // Wait for tree-sitter to finish loading (started in parallel during Phase 1)
            await Parser.initTreeSitter();
            // Pre-compile call patterns once — avoids 500K+ RegExp compilations
            var precompiledCallPatterns=Parser.prepareCallPatterns(fnNames);
            // Phase 2: Find calls in batches with yielding to prevent UI freeze
            var CALL_BATCH=30;
            for(var bi=0;bi<analyzed.length;bi+=CALL_BATCH){
                var batchEnd=Math.min(bi+CALL_BATCH,analyzed.length);
                setProgress('Analyzing dependencies (2/5)... '+batchEnd+'/'+analyzed.length+' files');
                for(var fi=bi;fi<batchEnd;fi++){
                    var file=analyzed[fi];
                    if(!file.content)continue;
                    var calls=Parser.findCalls(file.content,fnNames,file.path,allFns,precompiledCallPatterns);
                    Object.entries(calls).forEach(function(entry){
                        var fn=entry[0],cnt=entry[1];
                        if(cnt<=0)return;
                        var def=fnStats[fn]?fnStats[fn].file:null;
                        if(def){
                            if(def===file.path){
                                fnStats[fn].internal+=cnt;
                            }else{
                                conns.push({source:def,target:file.path,fn:fn,count:cnt});
                                var ex=fnStats[fn].callers.get(file.path);
                                if(ex)ex.count+=cnt;else fnStats[fn].callers.set(file.path,{file:file.path,name:file.name,count:cnt});
                                fnStats[fn].external+=cnt;
                            }
                        }
                    });
                }
                // Yield to browser between batches
                await new Promise(function(r){setTimeout(r,0);});
            }
            Object.values(fnStats).forEach(function(s){s.callers=Array.from(s.callers.values());s.count=s.internal+s.external;});
            var issues=[];
            var deadFns=Object.entries(fnStats).filter(function(x){
                var name=x[0],stats=x[1];
                if(stats.internal>0||stats.external>0)return false;
                if(stats.isClassMethod)return false;
                if(!stats.isTopLevel)return false;
                // Python-aware: skip decorated functions (framework-registered: routes, signals, etc.)
                if(stats.decorators&&stats.decorators.length>0)return false;
                // Python-aware: skip classes
                if(stats.type==='class'||stats.type==='dataclass'||stats.type==='abstract_class')return false;
                // Python-aware: skip dunder/magic methods
                var baseName=name.includes('.')?name.split('.').pop():name;
                if(baseName.startsWith('__')&&baseName.endsWith('__'))return false;
                // Python-aware: skip test functions
                if(baseName.startsWith('test_')||baseName==='setUp'||baseName==='tearDown'||baseName==='setUpClass'||baseName==='tearDownClass')return false;
                if(stats.file&&(stats.file.includes('test_')||stats.file.includes('_test.')||stats.file.includes('/tests/')))return false;
                // Python-aware: skip migration functions (Alembic)
                if((baseName==='upgrade'||baseName==='downgrade')&&stats.file&&(stats.file.includes('migration')||stats.file.includes('alembic')||stats.file.includes('versions')))return false;
                // Python-aware: skip common framework entry points
                if(['main','create_app','make_app','get_app','setup','configure','register','on_startup','on_shutdown','lifespan'].indexOf(baseName)>=0)return false;
                // JS/TS: skip explicitly exported functions (module exports are meant for external consumption)
                if(stats.isExported&&stats.file&&/\.[jt]sx?$/.test(stats.file))return false;
                // Skip functions in test/spec files (broader pattern)
                if(stats.file&&(/\.(?:spec|test)\.[jt]sx?$/.test(stats.file)||stats.file.includes('__tests__')))return false;
                return true;
            });
            if(deadFns.length)issues.push({type:'warning',title:deadFns.length+' Unused Functions',desc:'Functions not called from other files',items:deadFns.map(function(x){return{name:x[0],file:x[1].file,line:x[1].line,code:x[1].code};})});
            var godFiles=analyzed.filter(function(f){return f.functions.length>THRESHOLDS.maxFunctionsPerFile;});
            if(godFiles.length)issues.push({type:'critical',title:godFiles.length+' Large Files',desc:'Files with '+THRESHOLDS.maxFunctionsPerFile+'+ functions',items:godFiles.map(function(f){return{name:f.name+' ('+f.functions.length+' fns)',file:f.path,fns:f.functions.length,lines:f.lines};})});
            var coupling={};
            conns.forEach(function(c){coupling[c.target]=(coupling[c.target]||0)+1;});
            var highCoup=Object.entries(coupling).filter(function(x){return x[1]>THRESHOLDS.maxCouplingIn;}).sort(function(a,b){return b[1]-a[1];});
            if(highCoup.length)issues.push({type:'warning',title:highCoup.length+' Highly Coupled',desc:'Files imported by '+THRESHOLDS.maxCouplingIn+'+ others',items:highCoup.map(function(x){return{name:x[0].split('/').pop()+' ('+x[1]+' imports)',file:x[0],imports:x[1]};})});
            var connSet=new Set(conns.map(function(c){return c.source+'|'+c.target;}));
            var circular=[];
            conns.forEach(function(c){if(connSet.has(c.target+'|'+c.source)){var key=[c.source,c.target].sort().join('|');if(!circular.includes(key))circular.push(key);}});
            if(circular.length)issues.push({type:'critical',title:circular.length+' Circular Dependencies',desc:'Files that import each other',items:circular.map(function(p){var parts=p.split('|');return{name:parts.map(function(x){return x.split('/').pop();}).join(' ↔ '),files:parts};})});

            // Phase 3: Pattern and security detection with yielding
            setProgress('Detecting patterns (3/5)...');
            await new Promise(function(r){setTimeout(r,0);});
            var patterns=Parser.detectPatterns(analyzed);
            var securityIssues=Parser.detectSecurity(analyzed);

            // Phase 4: Duplicate detection and complexity (most expensive)
            setProgress('Analyzing code quality (4/5)...');
            await new Promise(function(r){setTimeout(r,0);});
            var duplicates=Parser.detectDuplicates(analyzed,allFns);
            var layerViolations=Parser.detectLayerViolations(analyzed,conns);

            // Calculate complexity in batches
            for(var ci=0;ci<analyzed.length;ci+=CALL_BATCH){
                var cEnd=Math.min(ci+CALL_BATCH,analyzed.length);
                for(var cj=ci;cj<cEnd;cj++){
                    analyzed[cj].complexity=Parser.calcComplexity(analyzed[cj].content,analyzed[cj].path);
                }
                if(ci+CALL_BATCH<analyzed.length)await new Promise(function(r){setTimeout(r,0);});
            }

            // Phase 5: Free file content from memory (can be lazy-loaded for preview)
            setProgress('Finalizing (5/5)...');
            await new Promise(function(r){setTimeout(r,0);});
            analyzed.forEach(function(f){f.content=null;});

            var folders=[...new Set(analyzed.map(function(f){return f.folder;}))].sort();
            var tree=buildTree(analyzed);
            var totalLoc=analyzed.reduce(function(s,f){return s+f.lines;},0);
            var langStats={};
            analyzed.forEach(function(f){var ext=f.name.split('.').pop().toLowerCase();langStats[ext]=(langStats[ext]||0)+f.lines;});
            var langArray=Object.entries(langStats).sort(function(a,b){return b[1]-a[1];}).map(function(e){return{ext:e[0],lines:e[1],pct:Math.round(e[1]/totalLoc*100)};});
            if(duplicates.length>0){
                var nameDups=duplicates.filter(function(d){return d.type==='name';});
                var codeDups=duplicates.filter(function(d){return d.type==='code';});
                if(nameDups.length)issues.push({type:'warning',title:nameDups.length+' Duplicate Function Names',desc:'Same function name in multiple files',items:nameDups.map(function(d){return{name:d.name+' ('+d.count+' files)',suggestion:d.suggestion,files:d.files,count:d.count};})});
                if(codeDups.length)issues.push({type:'warning',title:codeDups.length+' Similar Code Blocks',desc:'Copy-paste code detected',items:codeDups.map(function(d){return{name:d.name,suggestion:d.suggestion,files:d.files};})});
            }
            if(layerViolations.length>0){
                issues.push({type:'critical',title:layerViolations.length+' Architecture Violations',desc:'Lower layers importing from higher layers',items:layerViolations.map(function(v){return{name:v.fromLayer+' → '+v.toLayer,file:v.from,toFile:v.to,fn:v.fn,suggestion:v.suggestion};})});
            }
            var highComplexity=analyzed.filter(function(f){return f.complexity&&f.complexity.level==='critical';}).sort(function(a,b){return b.complexity.score-a.complexity.score;});
            if(highComplexity.length)issues.push({type:'warning',title:highComplexity.length+' High Complexity Files',desc:'Files with complexity score >30',items:highComplexity.map(function(f){return{name:f.name+' ('+f.complexity.score+')',file:f.path,score:f.complexity.score,lines:f.lines};})});
            var dataObj={files:analyzed,functions:allFns,connections:conns,fnStats:fnStats,folders:folders,tree:tree,issues:issues,patterns:patterns,securityIssues:securityIssues,duplicates:duplicates,layerViolations:layerViolations,deadFunctions:deadFns.map(function(x){var codeLines=x[1].code?x[1].code.split('\n').length:0;return{name:x[0],file:x[1].file,folder:x[1].folder,line:x[1].line,code:x[1].code,codeLines:codeLines,ext:x[1].file.split('.').pop()};}),stats:{files:analyzed.length,functions:allFns.length,connections:conns.length,dead:deadFns.length,patterns:patterns.length,security:securityIssues.filter(function(i){return i.severity==='high';}).length,duplicates:duplicates.length,violations:layerViolations.length,loc:totalLoc,languages:langArray}};
            dataObj.suggestions=Parser.generateSuggestions(dataObj);
            dataObj.testCoverage=buildTestCoverageMap(analyzed,conns);
            var archRules=loadArchRules();
            dataObj.archRuleViolations=applyArchitectureRules(analyzed,conns,archRules);
            if(dataObj.archRuleViolations.length)issues.push({type:'critical',title:dataObj.archRuleViolations.length+' Custom Rule Violations',desc:'Violations of custom architecture rules',items:dataObj.archRuleViolations.slice(0,20).map(function(v){return{name:v.fromLayer+'→'+v.toLayer+': '+v.reason,file:v.from,toFile:v.to};})});
            saveSnapshot(dataObj,'local/folder');
            var _localName=dirHandle&&dirHandle.name?dirHandle.name:'folder';
            var _localKey='local/'+_localName;
            var _localRInfo={owner:'local',repo:_localName,name:_localName};
            saveToSessionCache(_localKey,dataObj,_localRInfo,_localName+' (local)');
            setData(dataObj);
            setExpandedPaths(new Set(['']));
            setRepoInfo({owner:'local',repo:'folder',name:'Local Folder'});
            setLoading(false);
            }catch(err){
                setError('Analysis failed: '+(err.message||err)+'. Try a smaller folder or subfolder.');
                setLoading(false);
            }
        }

        if(files.length===0){
            setError('No code files found in the selected folder');
            setLoading(false);
            return;
        }

        processFiles().then(finishAnalysis).catch(function(e){
            setError('Analysis failed: '+(e.message||e)+'. Try a smaller folder or subfolder.');
            setLoading(false);
        });
    }

    // Syntax highlighting function
    function highlightSyntax(code,filename){
        if(!code)return'';
        var ext=(filename||'').split('.').pop().toLowerCase();
        var isJS=['js','jsx','ts','tsx','mjs','cjs'].includes(ext);
        var isPy=['py','pyw','pyi'].indexOf(ext)>=0;
        var isJava=['java','kt','scala','cs','go'].includes(ext);
        var isHTML=['html','htm','vue','svelte'].includes(ext);
        var isCSS=['css','scss','sass','less'].includes(ext);
        var isJSON=['json','yaml','yml','toml'].includes(ext);
        var isRuby=['rb','rake'].includes(ext);
        var isPHP=ext==='php';
        var isVBA=['vba','bas','cls','xlsm','xlam','xlsb','xla','xlw'].includes(ext);
        var isZig=ext==='zig';
        var isV=ext==='v';

    // Open file preview
    function openFilePreview(path,line){
        if(!repoInfo)return;
        var filename=path.split('/').pop();
        setFilePreview({path:path,filename:filename,content:null,line:line||null,loading:true,error:null});
        // Check if we already have the content in data
        if(data){
            var existingFile=data.files.find(function(f){return f.path===path;});
            if(existingFile&&existingFile.content){
                setFilePreview({path:path,filename:filename,content:existingFile.content,line:line||null,loading:false,error:null});
                return;
            }
        }
        // Fetch from GitHub or local directory
        if(localDirHandle){
            // Read from local directory using async traversal
            (async function(){
                try{
                    var parts=path.split('/');
                    var currentHandle=localDirHandle;
                    for(var i=0;i<parts.length-1;i++){
                        currentHandle=await currentHandle.getDirectoryHandle(parts[i]);
                    }
                    var fileHandle=await currentHandle.getFileHandle(parts[parts.length-1]);
                    var fileObj=await fileHandle.getFile();
                    var content=await fileObj.text();
                    setFilePreview({path:path,filename:filename,content:content,line:line||null,loading:false,error:null});
                }catch(e){
                    setFilePreview({path:path,filename:filename,content:null,line:line||null,loading:false,error:e.message||'Failed to load file'});
                }
            })();
        }else{
            // Fetch from GitHub
            GitHub.getFile(repoInfo.owner,repoInfo.repo,path).then(function(content){
                if(content){
                    setFilePreview({path:path,filename:filename,content:content,line:line||null,loading:false,error:null});
                }else{
                    setFilePreview({path:path,filename:filename,content:null,line:line||null,loading:false,error:'Could not load file content'});
                }
            }).catch(function(e){
                setFilePreview({path:path,filename:filename,content:null,line:line||null,loading:false,error:e.message||'Failed to load file'});
            });
        }
    }

    var colorMap=useMemo(function(){
        if(!data)return{};
        var m={};
        if(colorMode==='folder'){data.folders.forEach(function(f,i){m[f]=COLORS[i%COLORS.length];});m['root']=COLORS[0];}
        else if(colorMode==='layer')data.files.forEach(function(f){m[f.path]=LAYER_COLORS[f.layer]||COLORS[0];});
        else if(colorMode==='nesting'){
            var maxNest=Math.max.apply(null,data.files.map(function(f){return f.nestingDepth||0;}))||1;
            data.files.forEach(function(f){var r=(f.nestingDepth||0)/maxNest;m[f.path]=r>0.7?'#ff5f5f':r>0.4?'#ff9f43':'#22c55e';});
        }else if(colorMode==='churn'){
            var maxC=Math.max.apply(null,data.files.map(function(f){return f.churn||0;}))||1;
            data.files.forEach(function(f){var r=(f.churn||0)/maxC;m[f.path]=r>0.7?'#ff5f5f':r>0.4?'#ff9f43':'#22c55e';});
        }else if(colorMode==='complexity'){
            var maxCx=Math.max.apply(null,data.files.map(function(f){return f.complexity?f.complexity.score:0;}))||1;
            data.files.forEach(function(f){var r=f.complexity?f.complexity.score/maxCx:0;m[f.path]=r>0.7?'#ff5f5f':r>0.4?'#ff9f43':'#22c55e';});
        }else if(colorMode==='coverage'){
            data.files.forEach(function(f){
                var pct=coverageData?coverageData.get(f.path):undefined;
                if(pct===undefined&&coverageData){coverageData.forEach(function(v,k){if(k.endsWith('/'+f.path)||k===f.path||k.endsWith(f.path))pct=v;});}
                m[f.path]=pct===undefined?'#555':pct>=80?'#22c55e':pct>=50?'#ff9f43':'#ff5f5f';
            });
        }else if(colorMode==='bundle'){
            var maxB=0;
            data.files.forEach(function(f){var b=getBundleSize(f.path,bundleData);if(b>maxB)maxB=b;});
            if(maxB>0){data.files.forEach(function(f){var b=getBundleSize(f.path,bundleData);var r=b/maxB;m[f.path]=b===0?'#555':r>0.7?'#ff5f5f':r>0.3?'#ff9f43':'#22c55e';});}
        }else if(colorMode==='owner'){
            var contributors=[];
            data.files.forEach(function(f){if(f.topContributor&&!contributors.includes(f.topContributor))contributors.push(f.topContributor);});
            data.files.forEach(function(f){
                if(!f.topContributor){m[f.path]='#555';}
                else{var idx=contributors.indexOf(f.topContributor);m[f.path]=COLORS[idx%COLORS.length];}
            });
        }else if(colorMode==='issues'){
            var maxI=0;
            if(issuesData)issuesData.forEach(function(v){if(v>maxI)maxI=v;});
            data.files.forEach(function(f){
                var cnt=issuesData?issuesData.get(f.path)||0:0;
                m[f.path]=cnt===0?'#22c55e':maxI>0&&cnt/maxI>0.5?'#ff5f5f':'#ff9f43';
            });
        }else if(colorMode==='dup'){
            // Build per-file duplicate hit count
            var dupHits={};
            if(data.duplicates)data.duplicates.forEach(function(d){
                d.files.forEach(function(fd){dupHits[fd.file]=(dupHits[fd.file]||0)+1;});
            });
            var maxD=Object.values(dupHits).reduce(function(a,b){return Math.max(a,b);},0)||1;
            data.files.forEach(function(f){
                var hits=dupHits[f.path]||0;
                if(hits===0){m[f.path]='#22c55e';return;}
                var ratio=hits/maxD;
                if(ratio>0.66)m[f.path]='#ff5f5f';
                else if(ratio>0.33)m[f.path]='#fb923c';
                else m[f.path]='#facc15';
            });
        }else if(colorMode==='exports'){
            // Color by exported vs internal ratio:
            // Green = mostly exported (API surface), Purple = mostly internal, Grey = no functions
            data.files.forEach(function(f){
                var fns=f.functions||[];
                if(fns.length===0){m[f.path]='#555';return;}
                var exported=fns.filter(function(fn){return fn.isExported;}).length;
                var ratio=exported/fns.length;
                if(ratio>=0.75)m[f.path]='#22c55e';       // high API surface — green
                else if(ratio>=0.4)m[f.path]='#f59e0b';   // mixed — amber
                else if(ratio>0)m[f.path]='#a78bfa';      // mostly internal — purple
                else m[f.path]='#374151';                  // fully internal — dark grey
            });
        }else if(colorMode==='runtime'){
            // Color by runtime call volume from loaded trace
            if(runtimeData&&runtimeData.hot_files){
                var maxCalls=runtimeData.hot_files.reduce(function(mx,f){return Math.max(mx,f.callCount);},1);
                runtimeData.hot_files.forEach(function(hf){
                    var ratio=hf.callCount/maxCalls;
                    if(ratio>=0.8)m[hf.file]='#ef4444';   // very hot — red
                    else if(ratio>=0.5)m[hf.file]='#f97316'; // hot — orange
                    else if(ratio>=0.25)m[hf.file]='#f59e0b'; // warm — amber
                    else m[hf.file]='#22c55e';              // cool — green
                });
            }
        }
        return m;
    },[data,colorMode,coverageData,bundleData,issuesData,runtimeData]);

    function drawMinimap(nodes,links,zoomRef,svgRef,minimapRef,getC){
        var canvas=minimapRef.current;
        if(!canvas||!svgRef.current)return;
        var ctx=canvas.getContext('2d');
        var mw=canvas.width,mh=canvas.height;
        ctx.clearRect(0,0,mw,mh);
        var xs=nodes.map(function(n){return n.x||0;});
        var ys=nodes.map(function(n){return n.y||0;});
        if(!xs.length)return;
        var minX=Math.min.apply(null,xs),maxX=Math.max.apply(null,xs);
        var minY=Math.min.apply(null,ys),maxY=Math.max.apply(null,ys);
        var pad=10,rw=maxX-minX||1,rh=maxY-minY||1;
        var scale=Math.min((mw-pad*2)/rw,(mh-pad*2)/rh);
        var ox=pad+(mw-pad*2-rw*scale)/2,oy=pad+(mh-pad*2-rh*scale)/2;
        // draw links
        ctx.strokeStyle=isLight?'rgba(0,0,0,0.08)':'rgba(255,255,255,0.08)';
        ctx.lineWidth=0.5;
        links.each?links.each(function(d){if(!d.source.x)return;ctx.beginPath();ctx.moveTo(ox+(d.source.x-minX)*scale,oy+(d.source.y-minY)*scale);ctx.lineTo(ox+(d.target.x-minX)*scale,oy+(d.target.y-minY)*scale);ctx.stroke();}):null;
        // draw nodes
        nodes.forEach(function(n){
            if(n.x==null)return;
            ctx.beginPath();
            ctx.arc(ox+(n.x-minX)*scale,oy+(n.y-minY)*scale,Math.max(1.5,2),0,Math.PI*2);
            ctx.fillStyle=getC(n);ctx.fill();
        });
        // draw viewport rect
        var tr=d3.zoomTransform(svgRef.current);
        var sw=svgRef.current.clientWidth,sh=svgRef.current.clientHeight;
        var vx0=(-tr.x/tr.k-minX)*scale+ox,vy0=(-tr.y/tr.k-minY)*scale+oy;
        var vw=(sw/tr.k)*scale,vh=(sh/tr.k)*scale;
        ctx.strokeStyle='rgba(99,102,241,0.85)';ctx.lineWidth=1;
        ctx.strokeRect(vx0,vy0,vw,vh);
    }
    /**

            var issCount=issuesData?issuesData.get(f.path)||0:0;

    // Architecture Diagram
    useEffect(function(){

        var LAYER_ORDER=['ui','components','services','utils','data','config','modules','test'];
        var LAYER_LABELS={ui:'Interface',components:'Components',services:'Services',utils:'Utilities',data:'Data Layer',config:'Config',modules:'Modules',test:'Tests'};
        var LAYER_COLORS_MAP=typeof LAYER_COLORS!=='undefined'?LAYER_COLORS:{};

        // Group files: layer → folderGroup → files[]
        var layerGroups={};
        filteredFiles.forEach(function(f){
            var layer=f.layer||'modules';
            var parts=(f.folder||'root').split('/').filter(Boolean);
            var grp=(parts[1]||parts[0]||'root');
            grp=grp.charAt(0).toUpperCase()+grp.slice(1);

            if(!layerGroups[layer][grp])layerGroups[layer][grp]=[];

            d3.select(container).append('div').style('display','flex').style('align-items','center').style('justify-content','center').style('height','100%').style('color','var(--t3)').style('font-size','13px').text('No architectural layers detected for this repo.');

            var sc=components.find(function(co){return co.paths.has(src);});

            if(sc&&tc&&sc.id!==tc.id){

        if(/\b(s3|storage|upload|cloudinary|firebase|gcs|blob)\b/.test(combined))extSystems.push({name:'Storage',color:'#10b981',icon:'☁️'});
        if(/\b(queue|bull|worker|kafka|rabbit|celery|sidekiq|beanstalk)\b/.test(combined))extSystems.push({name:'Queue',color:'#f97316',icon:'📨'});

      var n = sorted.length;

      canvas.width = labelWidth + n * cellSize;
      canvas.height = labelHeight + n * cellSize;

      var pathToIdx = new Map(sorted.map(function(f, i){ return [f.path, i]; }));

      ctx.textAlign = 'left';
      for (var rj = 0; rj < n; rj++) {
        ctx.save();
        ctx.translate(labelWidth + rj * cellSize + cellSize * 0.5, labelHeight - 4);
        ctx.rotate(-Math.PI / 4);

        var rect = canvas.getBoundingClientRect();

        var row = Math.floor((e.clientY - rect.top - labelHeight) / cellSize);

          tooltip.style.left = (e.clientX + 12) + 'px';
          tooltip.style.top = (e.clientY + 12) + 'px';
