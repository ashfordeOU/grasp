*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg0);color:var(--t0);height:100vh;overflow:hidden}
.app{display:flex;height:100vh;flex-direction:column}
.topbar{height:52px;background:linear-gradient(180deg,var(--bg2) 0%,var(--bg1) 100%);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:6px;flex-shrink:0;position:relative;overflow:visible;min-width:0}
.topbar::after{content:'';position:absolute;bottom:0;left:0;height:1px;background:linear-gradient(90deg,var(--acc),rgba(56,189,248,0.5),transparent);pointer-events:none;animation:topbar-glow 4s ease-in-out infinite}
.logo{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.logo-mark{width:34px;height:34px;flex-shrink:0;animation:logo-float 5s ease-in-out infinite;filter:drop-shadow(0 0 7px rgba(0,212,170,0.45))}
.logo-text{font-size:15px;font-weight:800;letter-spacing:-0.5px;background:linear-gradient(110deg,#fff 0%,var(--acc) 60%,#0099cc 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.repo-input-group{display:flex;gap:6px;flex:1 1 0;max-width:340px;min-width:100px;align-items:center;overflow:hidden}
.topbar-url{flex:1;min-width:100px;max-width:260px}
.topbar-token{width:110px;min-width:0;flex-shrink:1}
.repo-input{flex:1;padding:6px 12px;background:var(--bg0);border:1px solid var(--border);border-radius:4px;color:var(--t0);font-family:'JetBrains Mono',monospace;font-size:11px;transition:border-color 0.18s,box-shadow 0.18s}
.repo-input:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 2px rgba(0,212,170,0.15),inset 0 1px 0 rgba(0,212,170,0.05);animation:acc-border 2.5s ease-in-out infinite}
.topbar-actions{display:flex;gap:4px;margin-left:auto;flex-shrink:0;align-items:center;flex-wrap:nowrap}
.top-btn{padding:6px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--t1);font-family:inherit;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;transition:all 0.18s;font-weight:500;letter-spacing:0.2px}
.top-btn:hover{background:var(--bg4);border-color:rgba(0,212,170,0.38);color:var(--acc);box-shadow:0 2px 8px rgba(0,0,0,0.25)}
.top-btn.primary{background:linear-gradient(135deg,var(--acc) 0%,var(--acc2) 100%);color:#000;border-color:transparent;font-weight:700;border-radius:4px;font-family:'JetBrains Mono',monospace;letter-spacing:0.5px;animation:pulse-glow 2.8s ease-in-out infinite;box-shadow:0 2px 10px rgba(0,212,170,0.3)}
.top-btn.primary:hover{box-shadow:0 4px 22px rgba(0,212,170,0.55);transform:translateY(-1px);animation:none}
.top-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;animation:none}
.topbar-actions .top-btn{border-radius:4px;min-width:30px;justify-content:center}
.icon-btn{width:30px;height:30px;padding:0 !important;min-width:30px !important;justify-content:center}
.live-badge{display:flex;align-items:center;gap:4px;padding:3px 8px;background:rgba(248,113,113,0.12);border:1px solid rgba(248,113,113,0.4);border-radius:4px;font-size:10px;font-weight:700;color:var(--red);letter-spacing:0.5px;font-family:'JetBrains Mono',monospace;flex-shrink:0}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--red);animation:live-pulse 1.2s ease-in-out infinite}
@keyframes live-pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(248,113,113,0.6)}50%{opacity:0.6;box-shadow:0 0 0 4px rgba(248,113,113,0)}}
/* AI Chat panel */
.chat-panel{position:fixed;right:0;top:52px;bottom:24px;width:340px;background:var(--bg1);border-left:1px solid var(--border);display:flex;flex-direction:column;z-index:200;transform:translateX(100%);transition:transform 0.25s ease;box-shadow:-4px 0 24px rgba(0,0,0,0.4)}
.chat-panel.open{transform:translateX(0)}
.chat-panel-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.chat-panel-title{font-size:12px;font-weight:700;color:var(--t1);display:flex;align-items:center;gap:6px}
.chat-panel-close{background:none;border:none;color:var(--t3);cursor:pointer;font-size:18px;padding:0;line-height:1}
.chat-panel-close:hover{color:var(--t1)}
.chat-settings{padding:8px 14px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:6px;flex-shrink:0}
.chat-settings-row{display:flex;gap:6px;align-items:center}
.chat-model-select{flex:1;background:var(--bg3);border:1px solid var(--border);color:var(--t1);font-size:11px;padding:4px 8px;border-radius:4px;font-family:inherit}
.chat-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.chat-msg{display:flex;flex-direction:column;gap:2px}
.chat-msg-role{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--t3)}
.chat-msg.user .chat-msg-role{color:var(--acc)}
.chat-msg-body{font-size:12px;line-height:1.55;color:var(--t1);white-space:pre-wrap;word-break:break-word;padding:8px 10px;border-radius:6px;background:var(--bg3)}
.chat-msg.user .chat-msg-body{background:rgba(0,212,170,0.08);border:1px solid rgba(0,212,170,0.15)}
.chat-msg.assistant .chat-msg-body{background:var(--bg2);border:1px solid var(--border)}
.chat-msg.error .chat-msg-body{background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.2);color:var(--red)}
.chat-input-area{padding:10px 14px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px;flex-shrink:0}
.chat-textarea{background:var(--bg3);border:1px solid var(--border);color:var(--t1);font-size:12px;padding:8px 10px;border-radius:6px;resize:none;font-family:inherit;line-height:1.4;min-height:60px;max-height:120px}
.chat-textarea:focus{outline:none;border-color:rgba(0,212,170,0.4)}
.chat-send-row{display:flex;justify-content:space-between;align-items:center;gap:6px}
.chat-send-btn{background:var(--acc);border:none;color:#000;font-size:11px;font-weight:700;padding:5px 14px;border-radius:4px;cursor:pointer;font-family:inherit}
.chat-send-btn:disabled{opacity:0.4;cursor:not-allowed}
.chat-clear-btn{background:none;border:1px solid var(--border);color:var(--t3);font-size:11px;padding:5px 10px;border-radius:4px;cursor:pointer;font-family:inherit}
.chat-clear-btn:hover{color:var(--t1);border-color:var(--t2)}
.chat-suggestions{display:flex;flex-direction:column;gap:4px;padding:0 14px 8px}
.chat-sugg{background:var(--bg2);border:1px solid var(--border);color:var(--t2);font-size:10px;padding:5px 10px;border-radius:4px;cursor:pointer;text-align:left;font-family:inherit;line-height:1.3}
.chat-sugg:hover{color:var(--t1);border-color:rgba(0,212,170,0.3)}
.chat-key-input{flex:1;background:var(--bg3);border:1px solid var(--border);color:var(--t1);font-size:11px;padding:4px 8px;border-radius:4px;font-family:inherit}
.chat-key-input::placeholder{color:var(--t3)}
.chat-typing{display:flex;gap:3px;align-items:center;padding:8px 10px}
.chat-typing span{width:5px;height:5px;background:var(--t3);border-radius:50%;animation:chat-bounce 1.2s infinite}
.chat-typing span:nth-child(2){animation-delay:0.2s}
.chat-typing span:nth-child(3){animation-delay:0.4s}
@keyframes chat-bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
.timeline-panel{background:var(--bg1);border-top:1px solid var(--border);flex-shrink:0;overflow:hidden;transition:height 0.22s ease}
.timeline-header{display:flex;align-items:center;gap:8px;padding:6px 12px;cursor:pointer;user-select:none;font-size:11px;font-weight:600;color:var(--t1)}
.timeline-header:hover{background:var(--hover)}
.timeline-header-label{display:flex;align-items:center;gap:6px;flex:1}
.timeline-body{padding:8px 12px;overflow-x:auto;overflow-y:hidden}
.timeline-track{display:flex;align-items:center;gap:0;position:relative;height:48px;min-width:max-content;padding:0 8px}
.timeline-track::before{content:'';position:absolute;left:8px;right:8px;top:50%;height:2px;background:var(--bg3);border-radius:1px}
.tl-commit{position:relative;display:flex;flex-direction:column;align-items:center;cursor:pointer;padding:0 6px;z-index:1}
.tl-dot{width:10px;height:10px;border-radius:50%;background:var(--bg3);border:2px solid var(--t3);transition:all 0.15s;flex-shrink:0}
.tl-commit:hover .tl-dot,.tl-commit.active .tl-dot{background:var(--acc);border-color:var(--acc);box-shadow:0 0 8px rgba(0,212,170,0.5)}
.tl-commit.has-changes .tl-dot{border-color:var(--blue)}
.tl-commit.active.has-changes .tl-dot{background:var(--acc);border-color:var(--acc)}
.tl-label{font-size:8px;font-family:'JetBrains Mono',monospace;color:var(--t3);margin-top:4px;white-space:nowrap;transition:color 0.15s}
.tl-commit:hover .tl-label,.tl-commit.active .tl-label{color:var(--acc)}
.tl-info{padding:6px 12px 8px;font-size:11px;color:var(--t1);border-top:1px solid var(--border2);display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap}
.tl-info-hash{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--acc);background:var(--accbg);padding:2px 6px;border-radius:3px;flex-shrink:0}
.tl-info-msg{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tl-info-meta{font-size:10px;color:var(--t2);white-space:nowrap}
.tl-info-stats{display:flex;gap:8px;font-size:10px}
.tl-add{color:var(--green)}
.tl-del{color:var(--red)}
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:260px;min-width:180px;max-width:400px;background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:relative;background:linear-gradient(180deg,var(--bg2) 0%,var(--bg1) 100%)}
.resize-handle{position:absolute;top:0;right:-4px;width:8px;height:100%;cursor:col-resize;z-index:10}
.resize-handle:hover{background:var(--acc);opacity:0.3}
/* Panel collapse tabs — always-visible arrows on the panel edges */
.panel-collapse-tab{position:absolute;top:50%;transform:translateY(-50%);z-index:20;width:12px;height:28px;display:flex;align-items:center;justify-content:center;background:var(--bg2);border:1px solid var(--border);border-radius:0 4px 4px 0;cursor:pointer;color:var(--t3);transition:all 0.15s;flex-shrink:0;opacity:0.7}
.panel-collapse-tab:hover{background:var(--bg3);color:var(--acc);border-color:var(--acc);opacity:1;box-shadow:0 0 8px rgba(0,212,170,0.2)}
.panel-collapse-tab.right-side{border-radius:4px 0 0 4px;right:-12px}
.panel-collapse-tab.left-side{border-radius:0 4px 4px 0;left:-12px}
/* When collapsed, the tab sits on the edge of the viewport */
.panel-collapse-ghost{position:fixed;top:50%;transform:translateY(-50%);z-index:100;width:12px;height:28px;display:flex;align-items:center;justify-content:center;background:var(--bg2);border:1px solid var(--border);cursor:pointer;color:var(--t3);transition:all 0.15s;opacity:0.7}
.panel-collapse-ghost:hover{background:var(--bg3);color:var(--acc);border-color:var(--acc);opacity:1;box-shadow:0 0 8px rgba(0,212,170,0.2)}
.panel-collapse-ghost.ghost-left{left:0;border-radius:0 4px 4px 0}
.panel-collapse-ghost.ghost-right{right:0;border-radius:4px 0 0 4px}
.sidebar-section{padding:12px;border-bottom:1px solid var(--border)}
.sidebar-title{font-size:9px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;display:flex;align-items:center;gap:7px}
.sidebar-title::before{content:'';width:3px;height:13px;background:linear-gradient(to bottom,var(--acc),var(--acc2));border-radius:1px;flex-shrink:0;box-shadow:0 0 8px rgba(0,212,170,0.45)}
.sidebar-scroll{flex:1;overflow-y:auto;padding:8px}
.sidebar-scroll::-webkit-scrollbar{width:6px}
.sidebar-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.view-modes{display:flex;flex-direction:column;gap:2px}
.view-mode{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:4px;cursor:pointer;font-size:12px;color:var(--t1);border:1px solid transparent;transition:all 0.18s;font-weight:500;border-left:2px solid transparent}
.view-mode:hover{background:var(--hover);border-color:var(--border);border-left-color:var(--border)}
.view-mode.active{background:var(--accbg);color:var(--acc);border-color:rgba(0,212,170,0.15);border-left-color:var(--acc);box-shadow:inset 0 1px 0 rgba(0,212,170,0.08)}
.view-mode-icon{font-size:14px}
.view-mode-badge{margin-left:auto;font-size:9px;background:var(--red);color:white;padding:2px 6px;border-radius:8px}
.color-toggle{display:grid;grid-template-columns:repeat(6,1fr);gap:2px;background:var(--bg0);border:1px solid var(--border);border-radius:4px;padding:3px}
.ct-btn{flex:none;width:100%;padding:5px 1px 4px;background:transparent;border:none;border-radius:3px;cursor:pointer;font-size:14px;line-height:1;transition:all 0.15s;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--t2);font-family:'JetBrains Mono',monospace;min-width:0;overflow:hidden}
.ct-btn svg{opacity:0.7;transition:opacity 0.15s}
.ct-btn:hover svg,.ct-btn.active svg{opacity:1}
.ct-btn:hover{background:var(--hover)}
.ct-btn.active{background:var(--accbg);box-shadow:inset 0 0 0 1px rgba(0,212,170,0.3)}
.ct-label{font-size:6.5px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:0.2px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;display:block;text-align:center}
.ct-btn.active .ct-label{color:var(--acc)}
.stats-grid{display:flex;flex-direction:column;gap:3px}
.stat-card{background:var(--bg0);border:1px solid var(--border);border-radius:4px;padding:7px 10px 7px 14px;position:relative;overflow:hidden;transition:border-color 0.18s,transform 0.18s,box-shadow 0.18s;display:flex;flex-direction:row;align-items:center;text-align:left;gap:8px}
.stat-card::before{content:'';position:absolute;top:0;left:0;bottom:0;right:auto;width:3px;height:100%;background:linear-gradient(to bottom,var(--acc),var(--blue));opacity:0.7;transition:opacity 0.18s}
.stat-card:hover{border-color:rgba(0,212,170,0.3);transform:translateX(2px);box-shadow:0 2px 12px rgba(0,0,0,0.3)}
.stat-card:hover::before{opacity:1}
.stat-value{font-size:16px;font-weight:700;color:var(--t0);font-family:'JetBrains Mono',monospace;letter-spacing:-0.5px;flex-shrink:0;min-width:40px}
.stat-label{font-size:10px;font-weight:500;color:var(--t2);text-transform:uppercase;letter-spacing:0.8px;flex:1;margin-left:auto;text-align:right}
.stat-card.warn .stat-value{color:var(--orange)}
.update-banner{margin:0 0 8px;padding:7px 10px;background:rgba(0,212,170,0.08);border:1px solid rgba(0,212,170,0.28);border-radius:6px;font-size:10px;color:var(--acc);cursor:pointer;display:flex;align-items:center;gap:7px;transition:background 0.18s;user-select:none}
.update-banner:hover{background:rgba(0,212,170,0.18)}
.update-banner-icon{font-size:13px;flex-shrink:0;animation:spin 2s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
/* Watch notification popup */
@keyframes notif-in{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes notif-progress{from{width:100%}to{width:0%}}
.watch-notif{position:fixed;top:16px;right:16px;z-index:2000;width:320px;background:var(--bg1,#1a1d2e);border:1px solid rgba(245,158,11,0.5);border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,0.5);animation:notif-in .25s ease;overflow:hidden;}
.watch-notif-body{padding:14px 16px 10px;}
.watch-notif-title{font-size:11px;font-weight:700;color:#f59e0b;margin-bottom:4px;display:flex;align-items:center;gap:6px;}
.watch-notif-msg{font-size:10px;color:rgba(255,255,255,0.7);margin-bottom:12px;line-height:1.4;}
.watch-notif-btns{display:flex;gap:8px;}
.watch-notif-pull{flex:1;padding:5px 10px;background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.4);border-radius:5px;color:#f59e0b;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;}
.watch-notif-pull:hover{background:rgba(245,158,11,0.28);border-color:#f59e0b;}
.watch-notif-dismiss{padding:5px 10px;background:none;border:1px solid rgba(255,255,255,0.1);border-radius:5px;color:rgba(255,255,255,0.4);font-size:10px;cursor:pointer;font-family:inherit;transition:all .15s;}
.watch-notif-dismiss:hover{border-color:rgba(255,255,255,0.25);color:rgba(255,255,255,0.6);}
.watch-notif-bar{height:3px;background:rgba(245,158,11,0.25);}
.watch-notif-bar-fill{height:100%;background:#f59e0b;animation:notif-progress 12s linear forwards;}
/* Diff panel modal */
.diff-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:1500;display:flex;align-items:center;justify-content:center;padding:16px;}
.diff-modal{background:var(--bg1,#1a1d2e);border:1px solid var(--border,rgba(255,255,255,0.08));border-radius:12px;width:560px;max-width:100%;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,0.6);}
.diff-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border,rgba(255,255,255,0.08));}
.diff-title{font-size:13px;font-weight:700;color:rgba(255,255,255,0.9);}
.diff-close{background:none;border:none;color:rgba(255,255,255,0.4);font-size:18px;cursor:pointer;padding:0 4px;line-height:1;transition:color .15s;}
.diff-close:hover{color:rgba(255,255,255,0.8);}
.diff-body{padding:20px;overflow-y:auto;flex:1;}
.diff-score-row{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:8px;margin-bottom:18px;}
.diff-score-row.improved{background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.2);}
.diff-score-row.degraded{background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.2);}
.diff-score-row.same{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);}
.diff-score-val{font-size:22px;font-weight:800;font-family:monospace;}
.diff-score-arrow{font-size:16px;opacity:0.5;}
.diff-score-delta{font-size:13px;font-weight:700;}
.diff-score-delta.pos{color:#22c55e;}
.diff-score-delta.neg{color:#f87171;}
.diff-score-delta.zero{color:rgba(255,255,255,0.4);}
.diff-stats-row{display:flex;gap:16px;margin-bottom:18px;flex-wrap:wrap;}
.diff-stat{font-size:10px;color:rgba(255,255,255,0.5);}
.diff-stat span{font-weight:700;color:rgba(255,255,255,0.85);}
.diff-stat .pos{color:#22c55e;}
.diff-stat .neg{color:#f87171;}
.diff-section{margin-bottom:16px;}
.diff-section-title{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.diff-section-title::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.06);}
.diff-item{font-size:10px;padding:5px 8px;border-radius:4px;margin-bottom:4px;display:flex;align-items:flex-start;gap:6px;}
.diff-item.resolved{background:rgba(34,197,94,0.07);color:rgba(255,255,255,0.75);}
.diff-item.resolved .diff-icon{color:#22c55e;}
.diff-item.new-issue{background:rgba(248,113,113,0.07);color:rgba(255,255,255,0.75);}
.diff-item.new-issue .diff-icon{color:#f87171;}
.diff-item.neutral{background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.6);}
.diff-item.neutral .diff-icon{color:rgba(255,255,255,0.35);}
.diff-icon{flex-shrink:0;font-size:10px;margin-top:1px;}
.diff-empty{font-size:10px;color:rgba(255,255,255,0.25);font-style:italic;padding:4px 0;}
.diff-ci{display:inline-flex;align-items:center;gap:5px;font-size:10px;padding:3px 8px;border-radius:4px;}
.diff-ci.pass{background:rgba(34,197,94,0.1);color:#22c55e;border:1px solid rgba(34,197,94,0.25);}
.diff-ci.fail{background:rgba(248,113,113,0.1);color:#f87171;border:1px solid rgba(248,113,113,0.25);}
.diff-ci.pending{background:rgba(245,158,11,0.1);color:#f59e0b;border:1px solid rgba(245,158,11,0.25);}
.diff-footer{padding:14px 20px;border-top:1px solid var(--border,rgba(255,255,255,0.08));display:flex;justify-content:flex-end;gap:8px;}
/* Watch status in status bar */
.watch-status{display:inline-flex;align-items:center;gap:4px;font-size:9px;color:rgba(255,255,255,0.35);cursor:default;}
.watch-dot{width:5px;height:5px;border-radius:50%;background:#22c55e;animation:pulse-watch 2s ease-in-out infinite;}
@keyframes pulse-watch{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}
.ci-badge{display:inline-flex;align-items:center;gap:3px;font-size:9px;padding:1px 5px;border-radius:3px;cursor:default;}
.ci-badge.pass{background:rgba(34,197,94,0.1);color:#22c55e;}
.ci-badge.fail{background:rgba(248,113,113,0.1);color:#f87171;}
.ci-badge.pending{background:rgba(245,158,11,0.1);color:#f59e0b;}
.health-score{display:flex;align-items:center;gap:12px;padding:14px;background:var(--bg0);border-radius:6px;border:1px solid var(--border);box-shadow:inset 0 1px 0 rgba(255,255,255,0.04);transition:all 0.18s}
.health-score:hover{border-color:rgba(0,212,170,0.3);box-shadow:inset 0 1px 0 rgba(255,255,255,0.04),0 4px 16px rgba(0,0,0,0.3)}
.health-ring{width:52px;height:52px;position:relative;flex-shrink:0}
.health-ring svg{transform:rotate(-90deg)}
.health-ring-value{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700}
.health-info{flex:1}
.health-grade{font-size:16px;font-weight:700}
.health-label{font-size:9px;color:var(--t3)}
.repo-name-label{display:flex;align-items:baseline;gap:1px;padding:2px 2px 6px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:100%}
.repo-name-owner{font-size:10px;color:var(--t3);font-family:'JetBrains Mono',monospace;flex-shrink:1;overflow:hidden;text-overflow:ellipsis}
.repo-name-repo{font-size:12px;font-weight:600;color:var(--t1);font-family:'JetBrains Mono',monospace;overflow:hidden;text-overflow:ellipsis}
.health-block{background:var(--bg1);border:1px solid var(--border);border-radius:8px;padding:12px 14px;display:flex;align-items:center;gap:14px;transition:border-color 0.2s,box-shadow 0.2s}
.health-block:hover{border-color:rgba(148,163,184,0.2);box-shadow:0 3px 16px rgba(0,0,0,0.35)}
.health-ring-wrap{position:relative;width:70px;height:70px;flex-shrink:0}
.health-ring-wrap svg{display:block}
.health-ring-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0}
.health-ring-score{font-size:17px;font-weight:800;font-family:'JetBrains Mono',monospace;line-height:1;letter-spacing:-0.5px}
.health-ring-denom{font-size:8px;color:var(--t3);font-family:'JetBrains Mono',monospace;line-height:1;margin-top:1px}
.health-info-right{flex:1;min-width:0}
.health-grade-letter{font-size:34px;font-weight:900;font-family:'JetBrains Mono',monospace;line-height:1;letter-spacing:-2px}
.health-grade-word{font-size:10px;font-weight:600;color:var(--t2);margin-top:2px;letter-spacing:0.2px}
.health-score-tag{font-size:7.5px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1.3px;margin-top:6px}
.tree-folder{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:6px;cursor:pointer;font-size:11px;color:var(--t1);transition:background 0.1s}
.tree-folder:hover{background:var(--hover)}
.tree-folder.filtered{background:var(--accbg);color:var(--acc)}
.tree-toggle{width:12px;font-size:8px;color:var(--t3);transition:transform 0.15s}
.tree-toggle.open{transform:rotate(90deg)}
.tree-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tree-count{font-size:10px;color:var(--t3);background:var(--bg3);padding:1px 5px;border-radius:8px}
.tree-children{margin-left:16px}
.tree-file{display:flex;align-items:center;gap:6px;padding:4px 8px;margin-left:18px;border-radius:4px;cursor:pointer;font-size:11px;color:var(--t2)}
.tree-file:hover{background:var(--hover);color:var(--t0)}
.tree-file.active{background:var(--accbg);color:var(--acc)}
.canvas-area{flex:1;position:relative;background:var(--bg0);overflow:hidden;background-image:linear-gradient(rgba(148,163,184,0.038) 1px,transparent 1px),linear-gradient(90deg,rgba(148,163,184,0.038) 1px,transparent 1px),radial-gradient(circle,rgba(0,212,170,0.03) 1px,transparent 1px);background-size:36px 36px,36px 36px,72px 72px}
.canvas-area::before{content:'';position:absolute;top:0;left:0;right:0;height:12px;background:var(--bg0);z-index:49;pointer-events:none}
.canvas-area::after{content:'';position:absolute;top:0;left:0;right:0;height:60%;background:linear-gradient(180deg,rgba(0,212,170,0.018) 0%,transparent 100%);pointer-events:none;z-index:1;animation:sweep-up 12s linear infinite;will-change:transform}
.sessions-btn-wrap{position:relative}
.more-menu-wrap{position:relative}
.more-menu-btn{display:flex;width:28px;height:28px;padding:0;background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--t1);font-size:16px;cursor:pointer;align-items:center;justify-content:center;transition:all 0.15s;letter-spacing:1px;font-weight:700;flex-shrink:0}
.more-menu-btn:hover{background:var(--bg4);border-color:rgba(0,212,170,0.38);color:var(--acc)}
.more-menu{position:absolute;top:calc(100% + 6px);right:0;min-width:160px;background:var(--bg2);border:1px solid rgba(0,212,170,0.15);border-radius:8px;box-shadow:0 12px 40px rgba(0,0,0,0.6);z-index:1000;padding:4px;animation:slide-in-up 0.18s ease}
.more-menu-item{display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:5px;font-size:11px;color:var(--t1);cursor:pointer;transition:all 0.12s;border:none;background:transparent;width:100%;text-align:left;font-family:inherit;font-weight:500;white-space:nowrap}

<div id="update-toast" style="display:none;position:fixed;bottom:50px;right:16px;z-index:9999;width:290px;background:var(--bg1);border:1px solid var(--acc);border-radius:10px;padding:14px 16px;box-shadow:0 8px 32px rgba(0,0,0,0.6);font-size:11px;">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">

    <button onclick="dismissUpdate()" style="background:none;border:none;color:var(--t3);cursor:pointer;font-size:15px;line-height:1;padding:0;opacity:0.7" title="Dismiss">✕</button>
  </div>
  <div style="color:var(--t2);margin-bottom:12px;font-family:var(--font)">
    Current: v<span id="toast-cur-ver"></span>&nbsp;&nbsp;→&nbsp;&nbsp;<span style="color:#22c55e;font-weight:700">v<span id="toast-new-ver"></span></span>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:8px">
    <button id="update-apply-btn" onclick="applyGraspUpdate()" style="flex:1;background:var(--acc);color:var(--bg);border:none;padding:8px;border-radius:6px;cursor:pointer;font-weight:700;font-size:11px;font-family:var(--font)">⬆ Update Now</button>
    <button onclick="dismissUpdate()" style="background:none;border:1px solid var(--border);color:var(--t3);padding:8px 12px;border-radius:6px;cursor:pointer;font-size:11px;font-family:var(--font)">Later</button>
  </div>
  <div id="update-msg" style="font-size:10px;color:var(--t3);text-align:center;min-height:14px;font-family:var(--font)"></div>
</div>

<script>
window.GRASP_VERSION = '3.2.1';
window.GRASP_REPO    = 'ashfordeOU/grasp';
window.GRASP_FILE    = 'index.html';
window.GRASP_NPM_PKG = 'grasp-mcp-server';

function _parseVer(v){return(v||'0.0.0').split('.').map(Number);}
function _isNewer(a,b){var av=_parseVer(a),bv=_parseVer(b);for(var i=0;i<3;i++){if((av[i]||0)>(bv[i]||0))return true;if((av[i]||0)<(bv[i]||0))return false;}return false;}

async function checkForUpdates(){
  try{
    var raw=localStorage.getItem('grasp_update_dismissed');
    if(raw){var d=JSON.parse(raw);if(d.ts&&Date.now()-d.ts<86400000)return;}
    await new Promise(function(r){setTimeout(r,3000);});
    var res=await fetch('https://registry.npmjs.org/'+window.GRASP_NPM_PKG+'/latest',{cache:'no-store'});
    if(!res.ok)return;
    var data=await res.json();
    var latest=data.version;
    if(_isNewer(latest,window.GRASP_VERSION)){
      document.getElementById('toast-cur-ver').textContent=window.GRASP_VERSION;
      document.getElementById('toast-new-ver').textContent=latest;
      document.getElementById('update-toast').setAttribute('data-latest',latest);
      document.getElementById('update-toast').style.display='block';
    }
  }catch(e){}
}

function dismissUpdate(){
  var toast=document.getElementById('update-toast');
  var latest=toast.getAttribute('data-latest')||'';
  toast.style.display='none';
  try{localStorage.setItem('grasp_update_dismissed',JSON.stringify({ver:latest,ts:Date.now()}));}catch(e){}
}

async function applyGraspUpdate(){
  var btn=document.getElementById('update-apply-btn');
  var msg=document.getElementById('update-msg');
  btn.textContent='Fetching…';btn.disabled=true;
  msg.textContent='Downloading latest version…';
  try{
    var url='https://raw.githubusercontent.com/'+window.GRASP_REPO+'/main/'+window.GRASP_FILE;
    var res=await fetch(url);
    if(!res.ok)throw new Error('HTTP '+res.status);
    var html=await res.text();
    var blob=new Blob([html],{type:'text/html'});
    var a=document.createElement('a');
    a.href=URL.createObjectURL(blob);a.download=window.GRASP_FILE;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    msg.textContent='Downloaded ✓  Applying in 1s…';
    setTimeout(function(){window.location.href=URL.createObjectURL(new Blob([html],{type:'text/html'}));},1000);
  }catch(e){
    btn.textContent='⬆ Update Now';btn.disabled=false;
    msg.innerHTML='Could not auto-fetch. <a href="https://github.com/'+window.GRASP_REPO+'/releases" target="_blank" style="color:var(--acc)">View on GitHub →</a>';
  }
}

window.addEventListener('load',function(){checkForUpdates();});
</script>

            // Skip class methods (same method name in different classes is normal)
            if(fn.isClassMethod)return;
            // Skip Python class-scoped names (ClassName.method)
            if(fn.name.includes('.'))return;
            // Skip decorated functions (framework handlers have similar structures by design)
            if(fn.decorators&&fn.decorators.length>0)return;

            if(!fnByName[fn.name])fnByName[fn.name]=[];
            fnByName[fn.name].push(fn);
        });

        // Find duplicate names across different files - only report if suspicious
        Object.entries(fnByName).forEach(function(entry){
            var name=entry[0],fns=entry[1];
            var uniqueFiles=[...new Set(fns.map(function(f){return f.file;}))];

            // Only flag if in 3+ files (2 files might be intentional)
            if(uniqueFiles.length>=3){
                // Check if the code is actually similar (not just same name)
                var codeSamples=fns.filter(function(f){return f.code&&f.code.length>30;});
                if(codeSamples.length>=2){
                    // Compare first two code samples for similarity
                    var sim=Parser.codeSimilarity(codeSamples[0].code,codeSamples[1].code);
                    if(sim>THRESHOLDS.duplicateSimilarity){  // similarity threshold - likely a real duplicate
                        duplicates.push({
                            type:'name',
                            name:name,
                            count:uniqueFiles.length,
                            files:fns.map(function(f){return{file:f.file,line:f.line};}),
                            similarity:Math.round(sim*100),
                            suggestion:'Function "'+name+'" appears in '+uniqueFiles.length+' files with '+Math.round(sim*100)+'% similarity - consider consolidating'
                        });
                    }
                }
            }
        });

        // Find similar code blocks (improved algorithm)
        // Use structural hash that captures the essence of the code
        var codeGroups={};
        allFns.forEach(function(fn){
            if(!fn.code||fn.code.length<80)return;  // Skip very short functions

            // Create a structural fingerprint
            var fingerprint=Parser.codeFingerprint(fn.code);
            if(!fingerprint)return;

            if(!codeGroups[fingerprint])codeGroups[fingerprint]=[];
            codeGroups[fingerprint].push(fn);
        });

        Object.values(codeGroups).forEach(function(fns){
            if(fns.length>1){
                var uniqueFiles=[...new Set(fns.map(function(f){return f.file;}))];
                // Must be in different files to be a real duplication issue
                if(uniqueFiles.length>1){
                    // Verify with actual similarity check
                    var sim=Parser.codeSimilarity(fns[0].code,fns[1].code);
                    if(sim>THRESHOLDS.duplicateSimilarity){  // similarity threshold
                        duplicates.push({
                            type:'code',
                            name:fns.map(function(f){return f.name;}).join(', '),
                            count:fns.length,
                            files:fns.map(function(f){return{file:f.file,name:f.name,line:f.line};}),
                            similarity:Math.round(sim*100),
                            suggestion:'Similar code blocks ('+Math.round(sim*100)+'% match) - consider extracting to a shared utility'
                        });
                    }
                }
            }
        });

        return duplicates;
    },

    // Calculate code similarity using normalized comparison (0-1 scale)
    /**
     * Compute normalized similarity between two code strings using LCS (0 = no match, 1 = identical).
     * @param {string} code1
     * @param {string} code2
     * @returns {number}
     */
    codeSimilarity:function(code1,code2){
        if(!code1||!code2)return 0;

        // Normalize both code blocks
        function normalize(code){
            return code
                .replace(/\/\/.*$/gm,'')           // Remove JS single-line comments
                .replace(/#.*$/gm,'')              // Remove Python/Ruby comments
                .replace(/\/\*[\s\S]*?\*\//g,'')   // Remove multi-line comments
                .replace(/"""[\s\S]*?"""/g,'S')    // Remove Python docstrings (triple double)
                .replace(/'''[\s\S]*?'''/g,'S')    // Remove Python docstrings (triple single)
                .replace(/['"`][^'"`]*['"`]/g,'S') // Normalize strings
                .replace(/\b\d+\.?\d*\b/g,'N')     // Normalize numbers
                .replace(/\s+/g,' ')               // Normalize whitespace
                .trim();
        }

        var n1=normalize(code1);
        var n2=normalize(code2);

        if(n1===n2)return 1;
        if(n1.length===0||n2.length===0)return 0;

        // Use longest common subsequence ratio
        var lcs=Parser.lcsLength(n1,n2);
        var maxLen=Math.max(n1.length,n2.length);
        return lcs/maxLen;
    },

    /**
     * Longest Common Subsequence (LCS) length.
     * Algorithm: standard O(n·m) DP with proportional sampling when n·m > THRESHOLDS.lcsMaxCells
     * to prevent UI freeze on large inputs.
     * @param {string} s1
     * @param {string} s2
     * @returns {number} LCS length
     */
    lcsLength:function(s1,s2){
        if(s1.length*s2.length>THRESHOLDS.lcsMaxCells){
            // Sample both strings proportionally so cell count stays ≤1M
            var ratio=Math.sqrt(1000000/(s1.length*s2.length));
            var step=Math.ceil(1/ratio);
            s1=s1.split('').filter(function(_,i){return i%step===0;}).join('');
            s2=s2.split('').filter(function(_,i){return i%step===0;}).join('');
        }
        var m=s1.length,n=s2.length;
        var prev=new Array(n+1).fill(0);
        var curr=new Array(n+1).fill(0);
        for(var i=1;i<=m;i++){
            for(var j=1;j<=n;j++){
                if(s1[i-1]===s2[j-1]){curr[j]=prev[j-1]+1;}
                else{curr[j]=Math.max(prev[j],curr[j-1]);}
            }
            var tmp=prev;prev=curr;curr=tmp;
            curr.fill(0);
        }
        return prev[n];
    },

    // Create a structural fingerprint for code (for grouping similar code)
    /**
     * Create a structural fingerprint of a code snippet for fast duplicate grouping.
     * Strips identifiers/literals, keeping only structural tokens (keywords, operators, punctuation).
     * @param {string} code
     * @returns {string|null} fingerprint string, or null if code is too short
     */
    codeFingerprint:function(code){
        if(!code||code.length<50)return null;

        // Extract structural elements
        var structure=code
            .replace(/\/\/.*$/gm,'')           // Remove comments
            .replace(/\/\*[\s\S]*?\*\//g,'')
            .replace(/['"`][^'"`]*['"`]/g,'')  // Remove string contents
            .replace(/\b[a-zA-Z_$][a-zA-Z0-9_$]*\b/g,'I')  // All identifiers -> I
            .replace(/\b\d+\.?\d*\b/g,'N')     // All numbers -> N
            .replace(/\s+/g,'');               // Remove whitespace

        // Take a hash-like fingerprint based on structure length and key patterns
        var patterns={
            loops:(structure.match(/for|while/g)||[]).length,
            conditions:(structure.match(/if|\?/g)||[]).length,
            calls:(structure.match(/I\(/g)||[]).length,
            returns:(structure.match(/return/g)||[]).length,
            len:Math.floor(structure.length/50)*50  // Bucket by length
        };

        // Create fingerprint string
        return 'L'+patterns.loops+'C'+patterns.conditions+'F'+patterns.calls+'R'+patterns.returns+'S'+patterns.len;
    },
    /**
     * Detect architectural layer violations: foundational layers importing from presentation layers.
     * Layer order: config(0) < utils(1) < data(2) < services(3) < modules(4) < ui(5) < test(6).
     * A violation occurs when a lower-numbered layer imports from a layer more than 1 level above it.
     * @param {Array<{path:string, layer:string}>} files
     * @param {Array<{source:string, target:string, fn:string}>} connections
     * @returns {Array<{source:string, srcLayer:string, target:string, tgtLayer:string, fn:string}>}
     */
    detectLayerViolations:function(files,connections){
        var violations=[];
        // Higher number = higher abstraction (closer to user). Violation = foundational layer imports presentation layer.
        var layerOrder={config:0,util:1,utils:1,helper:1,lib:1,core:1,data:2,model:2,classes:2,service:3,services:3,api:3,feature:3,modules:4,component:4,components:4,ui:5,page:5,view:5,presentation:5,forms:5,test:6};
        connections.forEach(function(c){
            var srcFile=files.find(function(f){return f.path===c.source;});
            var tgtFile=files.find(function(f){return f.path===c.target;});
            if(!srcFile||!tgtFile)return;
            var srcLayer=(srcFile.layer||'').toLowerCase();
            var tgtLayer=(tgtFile.layer||'').toLowerCase();
            var srcLevel=layerOrder[srcLayer];
            var tgtLevel=layerOrder[tgtLayer];
            // Violation: foundational layer (low number) importing from presentation layer (high number)
            if(srcLevel!==undefined&&tgtLevel!==undefined&&srcLevel<tgtLevel&&tgtLevel-srcLevel>1){
                violations.push({
                    from:srcFile.path,
                    fromLayer:srcFile.layer,
                    to:tgtFile.path,
                    toLayer:tgtFile.layer,
                    fn:c.fn,
                    suggestion:srcFile.layer+' should not import from '+tgtFile.layer+'. Consider inverting the dependency or using dependency injection.'
                });
            }
        });
        return violations;
    },
    /**
     * Compute cyclomatic complexity for a source file.
     * Counts branching keywords (if/else/while/for/case/try/catch) using language-specific patterns.
     * @param {string} content - raw file content
     * @param {string} filePath - used to detect language (Python vs JS)
     * @returns {{score:number, level:'low'|'medium'|'high'|'critical'}}
     */
    calcComplexity:function(content,filePath){
        if(!content)return{score:0,level:'low'};
        var complexity=1;
        var isPython=filePath&&/\.py[iwx]?$/.test(filePath);
        if(isPython){
            // Python-only patterns — no JS patterns applied
            var pyPats=[/\bif\s+/g,/\belif\s+/g,/\bwhile\s+/g,/\bfor\s+\w+\s+in\s+/g,/\bexcept\b/g,/\bwith\s+/g,/\band\b/g,/\bor\b/g];
            pyPats.forEach(function(p){var m=content.match(p);if(m)complexity+=m.length;});
        } else {
            // JS/TS/C-style patterns — no Python patterns applied
            var jsPats=[/\bif\s*\(/g,/\belse\s+if\s*\(/g,/\bwhile\s*\(/g,/\bfor\s*\(/g,/\bcase\s+/g,/\bcatch\s*\(/g,/\?\s*[^:]+\s*:/g,/&&/g,/\|\|/g];
            jsPats.forEach(function(p){var m=content.match(p);if(m)complexity+=m.length;});
        }
        var level=complexity>THRESHOLDS.complexityCritical?'critical':complexity>THRESHOLDS.complexityHigh?'high':complexity>THRESHOLDS.complexityMedium?'medium':'low';
        return{score:complexity,level:level};
    },
    generateSuggestions:function(data){

        }

        var circular=data.issues.filter(function(i){return i.title&&i.title.includes('Circular');});
        if(circular.length){
            suggestions.push({priority:'critical',icon:'🔄',title:'Break Circular Dependencies',desc:circular.length+' circular dependencies found. These cause tight coupling and make testing difficult.',action:'Extract shared code to a new module or use dependency injection',impact:'Improves testability and modularity'});
        }
        // Based on god files
        var godFiles=data.issues.filter(function(i){return i.title&&i.title.includes('Large');});
        if(godFiles.length){
            suggestions.push({priority:'high',icon:'✂️',title:'Split Large Files',desc:godFiles.length+' files have too many functions. Split by responsibility.',action:'Group related functions and extract to separate modules',impact:'Improves code navigation and testing'});
        }
        // Based on high coupling
        var coupling=data.issues.filter(function(i){return i.title&&i.title.includes('Coupled');});
        if(coupling.length){
            suggestions.push({priority:'medium',icon:'🔗',title:'Reduce Coupling',desc:coupling.length+' files are imported by many others. Consider if this is intentional.',action:'Review if these should be split or if importers should be consolidated',impact:'Reduces blast radius of changes'});
        }
        // Based on duplicates
        if(data.duplicates&&data.duplicates.length>0){
            var nameDups=data.duplicates.filter(function(d){return d.type==='name';});
            var codeDups=data.duplicates.filter(function(d){return d.type==='code';});
            if(nameDups.length){
                suggestions.push({priority:'medium',icon:'📛',title:'Resolve Naming Conflicts',desc:nameDups.length+' function names are duplicated across files. This can cause confusion.',action:'Rename functions to be more specific or consolidate into shared module',impact:'Prevents bugs from importing wrong function'});
            }
            if(codeDups.length){
                suggestions.push({priority:'high',icon:'📋',title:'Extract Duplicated Code',desc:codeDups.length+' instances of similar code found. DRY principle violation.',action:'Create shared utility functions',impact:'Reduces maintenance burden and potential bugs'});
            }
        }
        // Based on layer violations
        if(data.layerViolations&&data.layerViolations.length>0){
            suggestions.push({priority:'high',icon:'🏗️',title:'Fix Architecture Violations',desc:data.layerViolations.length+' layer violations found. Lower layers should not depend on higher layers.',action:'Invert dependencies or use interfaces/events',impact:'Improves architecture and testability'});
        }
        // Based on security
        var highSec=data.securityIssues?data.securityIssues.filter(function(s){return s.severity==='high';}):[];
        if(highSec.length){
            suggestions.push({priority:'critical',icon:'🔐',title:'Fix Security Issues',desc:highSec.length+' high-severity security issues found.',action:'Address hardcoded secrets, injection risks immediately',impact:'Prevents potential security breaches'});
        }
        // Test coverage hint
        var testFiles=data.files.filter(function(f){return f.name.includes('.test.')||f.name.includes('.spec.')||f.path.includes('__tests__');});
        var testRatio=data.files.length>0?(testFiles.length/data.files.length*100):0;
        if(testRatio<10&&data.files.length>10){
            suggestions.push({priority:'medium',icon:'🧪',title:'Add Test Coverage',desc:'Only '+testFiles.length+' test files found ('+Math.round(testRatio)+'%). Consider adding more tests.',action:'Focus on testing critical paths and high-complexity files',impact:'Prevents regressions and improves confidence'});
        }
        return suggestions.sort(function(a,b){var p={critical:0,high:1,medium:2,low:3};return p[a.priority]-p[b.priority];});
    },
    detectSecurity:function(files){
        var issues=[];
        files.forEach(function(f){
            if(!f.content)return;
            var lines=f.content.split('\n');
            lines.forEach(function(line,idx){
                if(line.match(/(?:password|passwd|pwd|secret|api_key|apikey|token|auth)\s*[=:]\s*['"][^'"]{4,}['"]/i)&&!line.includes('process.env')&&!line.includes('config.')){
                    issues.push({severity:'high',title:'Hardcoded Secret',file:f.name,path:f.path,line:idx+1,desc:'Credentials should never be hardcoded. Use environment variables or a secrets manager.',code:line.trim().substring(0,80)});
                }
            });
            if(f.content.match(/query\s*\(\s*['"`][^'"`]*\s*\+/)||f.content.match(/execute\s*\(\s*['"`][^'"`]*\$\{/)||f.content.match(/\$\{.*\}.*(?:SELECT|INSERT|UPDATE|DELETE)/i)){

                issues.push({severity:'high',title:'XSS Vulnerability',file:f.name,path:f.path,desc:'Direct HTML injection can lead to XSS attacks. Sanitize user input.',code:''});
            }
            if(f.content.includes('eval(')){
                var evalLine=lines.findIndex(function(l){return l.includes('eval(');});
                issues.push({severity:'medium',title:'Dynamic Code Execution',file:f.name,path:f.path,line:evalLine+1,desc:'eval() executes arbitrary code. Avoid if possible or validate input strictly.',code:evalLine>=0?lines[evalLine].trim().substring(0,80):''});
            }
            if(f.content.includes('Function(')||f.content.match(/new\s+Function\s*\(/)){
                issues.push({severity:'medium',title:'Function Constructor',file:f.name,path:f.path,desc:'Function constructor is similar to eval(). Consider alternatives.',code:''});
            }

                issues.push({severity:'medium',title:'Command Execution',file:f.name,path:f.path,desc:'Shell command execution detected. Ensure input is sanitized to prevent injection.',code:''});
            }
            if(f.content.match(/console\.(log|debug|info)\(/)){

            if(f.content.match(/SendKeys\s*\(/i)){

            }
            if(f.content.match(/Shell\s*\(/i)){
                issues.push({severity:'high',title:'Shell Command Execution',file:f.name,path:f.path,desc:'Shell() executes system commands. Ensure input is validated.',code:''});
            }
            if(f.content.match(/CreateObject\s*\(\s*["']WScript\.Shell["']/i)){
                issues.push({severity:'high',title:'WScript.Shell Creation',file:f.name,path:f.path,desc:'Creating WScript.Shell object allows command execution. Use with caution.',code:''});
            }
            if(f.content.match(/Application\.Run\s*\(/i)){
                issues.push({severity:'medium',title:'Dynamic Code Execution',file:f.name,path:f.path,desc:'Application.Run can execute arbitrary code. Validate input.',code:''});
            }
            if(f.content.match(/On Error Resume Next/i)){
                var errorResumeCount=(f.content.match(/On Error Resume Next/gi)||[]).length;
                if(errorResumeCount>2){
                    issues.push({severity:'medium',title:'Excessive Error Suppression',file:f.name,path:f.path,desc:errorResumeCount+' instances of "On Error Resume Next" found. This can hide bugs.',code:''});
                }
            }
            if(f.content.match(/TODO|FIXME|HACK|XXX/)){

            }

            var isPyFile=f.name.endsWith('.py')||f.name.endsWith('.pyw');

                if(f.content.match(/\beval\s*\(/)){
                    var evalLine=lines.findIndex(function(l){return l.match(/\beval\s*\(/);});
                    issues.push({severity:'high',title:'Python eval()',file:f.name,path:f.path,line:evalLine>=0?evalLine+1:undefined,desc:'eval() executes arbitrary Python code. Use ast.literal_eval() for safe parsing.',code:evalLine>=0?lines[evalLine].trim().substring(0,80):''});
                }
                if(f.content.match(/\bexec\s*\(/)){
                    var execLine=lines.findIndex(function(l){return l.match(/\bexec\s*\(/);});
                    issues.push({severity:'high',title:'Python exec()',file:f.name,path:f.path,line:execLine>=0?execLine+1:undefined,desc:'exec() executes arbitrary Python code. This is almost always a security risk.',code:execLine>=0?lines[execLine].trim().substring(0,80):''});
                }
                // pickle - deserialization attacks
                if(f.content.match(/\bpickle\.load/)||f.content.match(/\bunpickle/)){
                    issues.push({severity:'high',title:'Pickle Deserialization',file:f.name,path:f.path,desc:'pickle.load() can execute arbitrary code from untrusted data. Use JSON or safe alternatives.',code:''});
                }
                // subprocess with shell=True
                if(f.content.match(/subprocess\.\w+\([^)]*shell\s*=\s*True/)){
                    issues.push({severity:'high',title:'Shell Injection Risk',file:f.name,path:f.path,desc:'subprocess with shell=True is vulnerable to command injection. Use shell=False with a list of args.',code:''});
                }
                // os.system / os.popen - command injection
                if(f.content.match(/\bos\.system\s*\(/)||f.content.match(/\bos\.popen\s*\(/)){

                    issues.push({severity:'high',title:'OS Command Execution',file:f.name,path:f.path,line:osLine>=0?osLine+1:undefined,desc:'os.system()/os.popen() are vulnerable to command injection. Use subprocess with shell=False.',code:osLine>=0?lines[osLine].trim().substring(0,80):''});
                }
                // __import__ - dynamic imports
                if(f.content.match(/__import__\s*\(/)){
                    issues.push({severity:'medium',title:'Dynamic Import',file:f.name,path:f.path,desc:'__import__() with user input can load arbitrary modules. Validate module names against an allowlist.',code:''});
                }
                // Bare except clauses
                var bareExcepts=(f.content.match(/\bexcept\s*:/g)||[]).length;
                if(bareExcepts>2){
                    issues.push({severity:'medium',title:'Bare Except Clauses',file:f.name,path:f.path,desc:bareExcepts+' bare except: clauses found. These catch all exceptions including SystemExit and KeyboardInterrupt.',code:''});
                }

                if(!f.name.includes('test')&&!f.path.includes('test')){
                    var assertCount=(f.content.match(/\bassert\s+/g)||[]).length;

                    }
                }

                if(f.content.match(/\bDEBUG\s*=\s*True\b/)){
                    issues.push({severity:'medium',title:'Debug Mode Enabled',file:f.name,path:f.path,desc:'DEBUG = True found. Ensure this is disabled in production.',code:''});
                }
            }
        });
        return issues.sort(function(a,b){var sev={high:0,medium:1,low:2};return sev[a.severity]-sev[b.severity];});
    },
    // AST-based function extraction - accurate detection without false positives
